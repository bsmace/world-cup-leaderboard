<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Office Pool — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
:root{
  --gold:#FDB824;--gold-lt:#FFD96A;--gold-dk:#D49A10;--gold-dim:rgba(253,184,36,.15);
  --teal:#00B8C4;--teal-lt:#2DD4E0;--teal-dk:#00707A;--teal-dim:rgba(0,184,196,.15);
  --silver:#D8E0EC;--silver-dk:#9BA8BC;
  --bronze:#E89B5E;--bronze-dk:#B47243;
  --navy:#050912;--navy2:#0A1228;--navy3:#0E1A30;
  --card:rgba(255,255,255,.035);--card-hi:rgba(255,255,255,.06);
  --edge:rgba(255,255,255,.08);--edge-hi:rgba(255,255,255,.14);
  --hover:rgba(255,255,255,.07);
  --ink:#FFF;--dim:#7A8FA8;--dim2:#4A5A70;
  --r:18px;--rs:12px;
  --shadow-lg:0 30px 80px -20px rgba(0,0,0,.6);
  --shadow-glow-g:0 0 60px rgba(253,184,36,.25);
  --shadow-glow-t:0 0 60px rgba(0,184,196,.2);
}
body{
  background:var(--navy);color:var(--ink);
  font-family:Inter,system-ui,-apple-system,sans-serif;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"cv11","ss01","ss03";
}
/* Atmospheric background layers */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1200px 500px at 50% -200px, rgba(253,184,36,.10), transparent 65%),
    radial-gradient(600px 500px at 5% 20%, rgba(0,184,196,.05), transparent 55%),
    radial-gradient(600px 500px at 95% 20%, rgba(253,184,36,.04), transparent 55%),
    radial-gradient(800px 600px at 50% 120%, rgba(0,184,196,.04), transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at 50% 0%,black 0%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 0%,black 0%,transparent 70%);
}
.wrap{max-width:1120px;margin:0 auto;padding:40px 20px 60px;position:relative;z-index:1}

/* ─── HEADER ─── */
.header{text-align:center;margin-bottom:40px;position:relative}
.h-trophy{
  font-size:48px;line-height:1;margin-bottom:8px;
  filter:drop-shadow(0 8px 24px var(--gold-dim));
  animation:trophyFloat 4s ease-in-out infinite;
  display:inline-block;
}
@keyframes trophyFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
.h-badge{
  display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--navy);
  background:linear-gradient(135deg,var(--gold-lt),var(--gold),var(--gold-dk));
  padding:7px 20px;border-radius:999px;margin-bottom:18px;
  box-shadow:0 8px 28px rgba(253,184,36,.3),inset 0 1px 0 rgba(255,255,255,.4);
  position:relative;overflow:hidden;
}
.h-badge::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.6) 50%,transparent 65%);
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
h1{
  font-family:'Bebas Neue',sans-serif;font-weight:400;line-height:.82;
  font-size:clamp(56px,12vw,128px);text-transform:uppercase;
  background:linear-gradient(180deg,#fff 8%,var(--gold-lt) 50%,var(--gold) 78%,var(--gold-dk));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 8px 32px var(--gold-dim));letter-spacing:-.02em;
  position:relative;display:inline-block;
}
h1::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 40%,rgba(255,255,255,.5) 50%,transparent 60%);
  -webkit-background-clip:text;background-clip:text;
  background-size:200% 100%;
  animation:titleSweep 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes titleSweep{0%,100%{background-position:200% 0}50%{background-position:-100% 0}}
.h-sub{
  margin-top:10px;color:var(--dim);font-size:clamp(12px,1.6vw,14px);
  max-width:560px;margin-inline:auto;line-height:1.6;
  font-weight:500;
}
.h-sub b{color:#fff;font-weight:700}
.pulse{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--teal-lt);margin-right:6px;vertical-align:middle;
  box-shadow:0 0 12px var(--teal-lt);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 12px var(--teal-lt)}50%{opacity:.3;transform:scale(.6);box-shadow:0 0 4px var(--teal-lt)}}

/* ─── SEARCH + FILTERS ─── */
.sf{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.srch{position:relative;flex:1;max-width:340px;min-width:220px}
.srch input{
  width:100%;padding:13px 16px 13px 44px;border-radius:14px;
  border:1px solid var(--edge);background:rgba(255,255,255,.04);color:#fff;
  font-size:14px;font-family:inherit;outline:none;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:all .25s;
}
.srch input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 4px rgba(253,184,36,.1),0 8px 24px rgba(0,0,0,.3);
  background:rgba(255,255,255,.06);
}
.srch input::placeholder{color:var(--dim)}
.srch .ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px;pointer-events:none}
.fp{display:flex;gap:6px;flex-wrap:wrap}
.fp button{
  padding:8px 18px;border-radius:999px;border:1px solid var(--edge);
  background:rgba(255,255,255,.04);color:var(--dim);font-size:12px;
  font-weight:600;font-family:inherit;cursor:pointer;transition:all .25s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap;
  letter-spacing:.02em;
}
.fp button:hover{background:var(--hover);color:#fff;transform:translateY(-1px)}
.fp button.a{
  background:linear-gradient(135deg,var(--gold-lt),var(--gold),var(--gold-dk));
  color:var(--navy);border-color:transparent;
  box-shadow:0 6px 20px rgba(253,184,36,.3),inset 0 1px 0 rgba(255,255,255,.4);
}
#scnt{text-align:center;font-size:12px;color:var(--dim);margin-top:4px;min-height:18px;width:100%;font-weight:500;letter-spacing:.02em}

/* ─── PODIUM ─── */
.pd{
  display:grid;grid-template-columns:1fr 1.35fr 1fr;gap:14px;
  align-items:end;margin-bottom:40px;
}
.pd-c{
  border-radius:22px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  overflow:hidden;text-align:center;padding:26px 22px 22px;position:relative;
  cursor:pointer;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s;
  border:1px solid var(--edge);
}
.pd-c:hover{transform:translateY(-6px)}
.pd-1{
  padding:36px 28px 30px;
  background:linear-gradient(135deg,rgba(253,184,36,.14),rgba(253,184,36,.04) 50%,rgba(0,0,0,.2));
  border:1px solid rgba(253,184,36,.3);
  box-shadow:0 30px 80px -20px rgba(0,0,0,.7),0 0 80px rgba(253,184,36,.15),inset 0 1px 0 rgba(253,184,36,.2);
  animation:champFloat 5s ease-in-out infinite;
}
@keyframes champFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.pd-1::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(400px 200px at 50% -30px,rgba(253,184,36,.2),transparent 60%);
}
.pd-1::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.pd-2{
  background:linear-gradient(135deg,rgba(216,224,236,.08),rgba(216,224,236,.02) 50%,rgba(0,0,0,.2));
  border:1px solid rgba(216,224,236,.15);
  box-shadow:0 20px 60px -20px rgba(0,0,0,.6),inset 0 1px 0 rgba(216,224,236,.1);
}
.pd-3{
  background:linear-gradient(135deg,rgba(232,155,94,.08),rgba(232,155,94,.02) 50%,rgba(0,0,0,.2));
  border:1px solid rgba(232,155,94,.15);
  box-shadow:0 20px 60px -20px rgba(0,0,0,.6),inset 0 1px 0 rgba(232,155,94,.1);
}
.pd-icon{font-size:36px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.pd-1 .pd-icon{font-size:44px;animation:trophyFloat 4s ease-in-out infinite}
.pd-tag{
  display:inline-block;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:3px 14px;border-radius:999px;margin-bottom:8px;
}
.pd-1 .pd-tag{
  background:linear-gradient(135deg,var(--gold-lt),var(--gold));
  color:var(--navy);box-shadow:0 4px 14px rgba(253,184,36,.4);
}
.pd-2 .pd-tag{background:rgba(216,224,236,.18);color:var(--silver)}
.pd-3 .pd-tag{background:rgba(232,155,94,.18);color:var(--bronze)}
.pd-name{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,3.2vw,38px);line-height:1;color:#fff;
  letter-spacing:.01em;
}
.pd-1 .pd-name{font-size:clamp(32px,4.2vw,48px);text-shadow:0 2px 12px rgba(0,0,0,.4)}
.pd-flags{display:flex;justify-content:center;gap:10px;margin:12px 0 8px}
.pd-f{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:rgba(0,0,0,.3);border-radius:12px;padding:9px 13px 6px;
  border:1px solid rgba(255,255,255,.05);
}
.pd-f img{width:48px;height:32px;border-radius:3px;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.pd-1 .pd-f img{width:58px;height:39px}
.pd-fn{font-size:10px;color:var(--dim);font-weight:600;white-space:nowrap;line-height:1;letter-spacing:.02em}
.pd-fb{
  display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:800;
  padding:2px 7px;border-radius:99px;text-transform:uppercase;line-height:1.3;letter-spacing:.04em;
}
.pd-fb.go{background:rgba(0,184,196,.2);color:var(--teal-lt)}
.pd-fb.no{background:rgba(74,90,112,.25);color:var(--dim2)}
.pd-sc{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,6vw,64px);line-height:1;
  margin-top:6px;letter-spacing:.01em;
  font-variant-numeric:tabular-nums;
}
.pd-1 .pd-sc{
  font-size:clamp(60px,7.5vw,86px);
  background:linear-gradient(180deg,var(--gold-lt),var(--gold) 50%,#fff 80%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 20px rgba(253,184,36,.5));
}
.pd-2 .pd-sc{color:var(--silver);text-shadow:0 2px 12px rgba(216,224,236,.3)}
.pd-3 .pd-sc{color:var(--bronze);text-shadow:0 2px 12px rgba(232,155,94,.3)}
.pd-lbl{font-size:9px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.pd-bk{display:flex;justify-content:center;gap:14px;margin-top:10px;flex-wrap:wrap}
.pd-bk>span{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;letter-spacing:.04em}
.pd-bk b{color:#fff;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px}
.pd-j{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;width:100%}
.pd-jt{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:6px 10px;display:flex;align-items:center;gap:6px;
  cursor:pointer;transition:all .2s;
}
.pd-jt:hover{background:var(--hover);transform:translateY(-1px)}
.pd-jt img{width:20px;height:13px;border-radius:2px}
.pd-jn{font-size:11px;font-weight:600;white-space:nowrap}
.pd-jp{font-family:'Bebas Neue',sans-serif;font-size:16px;color:inherit;margin-left:2px}

/* ─── TIER CARDS ─── */
.t-grid{display:grid;gap:14px;margin-bottom:36px}
.t-card{
  background:var(--card);border:1px solid var(--edge);border-radius:var(--r);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:all .3s cubic-bezier(.16,1,.3,1);overflow:hidden;
  border-left:3px solid transparent;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.4);
}
.t-card:hover{transform:translateY(-3px);box-shadow:0 20px 50px -15px rgba(0,0,0,.6)}
.t-hd{display:flex;align-items:center;gap:10px;padding:14px 18px 0}
.t-hd .m{font-size:22px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.t-hd .l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;white-space:nowrap}
.t-hd .ptc{
  font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;margin-left:auto;
  font-variant-numeric:tabular-nums;
}
.t-body{padding:12px 16px 16px}
.t-row{display:grid;gap:10px}
.t-row.c2{grid-template-columns:1fr 1fr}
.ent{
  display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);border-radius:var(--rs);padding:10px 14px;
  cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);min-width:0;
  position:relative;overflow:hidden;
}
.ent::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 40%,rgba(255,255,255,.04) 50%,transparent 60%);
  background-size:200% 100%;background-position:200% 0;
  transition:background-position .6s;pointer-events:none;
}
.ent:hover{background:var(--card-hi);transform:translateY(-2px);border-color:var(--edge-hi)}
.ent:hover::before{background-position:-100% 0}
.ent .ef{display:flex;gap:6px;flex-shrink:0;align-items:center}
.ent .ef .ew{position:relative;display:inline-flex}
.ent .ef img{width:30px;height:20px;border-radius:2px;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.ent .eb{
  position:absolute;bottom:-4px;right:-4px;font-size:7px;line-height:1;
  background:linear-gradient(135deg,var(--teal-lt),var(--teal-dk));color:#fff;
  border-radius:50%;width:13px;height:13px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.4);font-weight:900;
}
.ent .i{min-width:0;flex:1}
.ent .nm{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.ent .tm{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ent .ad{display:flex;align-items:center;gap:5px;margin-top:4px}
.ent .ad .ab{
  font-size:8px;font-weight:800;padding:2px 6px;border-radius:99px;
  line-height:1.3;white-space:nowrap;letter-spacing:.04em;
}
.ent .ad .ab.go{background:rgba(0,184,196,.18);color:var(--teal-lt)}
.ent .ad .ab.no{background:rgba(74,90,112,.2);color:var(--dim2)}
.ent .pt{
  font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;margin-left:auto;flex-shrink:0;
  font-variant-numeric:tabular-nums;letter-spacing:.01em;
}
.ent .pb{
  width:64px;height:3px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:3px;
  position:relative;
}
.ent .pb .fl{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.16,1,.3,1);position:relative}
.ent .pb .fl::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  background-size:200% 100%;animation:barShine 2.5s linear infinite;
}
@keyframes barShine{0%{background-position:200% 0}100%{background-position:-200% 0}}

.t-g .t-hd .l,.t-g .t-hd .ptc,.t-g .ent .pt{color:var(--gold)}
.t-g{border-left-color:var(--gold);background:linear-gradient(135deg,rgba(253,184,36,.06),rgba(253,184,36,.01))}
.t-g .ent .pb .fl{background:linear-gradient(90deg,var(--gold-dk),var(--gold-lt))}
.t-s .t-hd .l,.t-s .t-hd .ptc,.t-s .ent .pt{color:var(--silver)}
.t-s{border-left-color:var(--silver)}
.t-s .ent .pb .fl{background:linear-gradient(90deg,var(--silver-dk),var(--silver))}
.t-b .t-hd .l,.t-b .t-hd .ptc,.t-b .ent .pt{color:var(--bronze)}
.t-b{border-left-color:var(--bronze)}
.t-b .ent .pb .fl{background:linear-gradient(90deg,var(--bronze-dk),var(--bronze))}
.t-ta .t-hd .l,.t-ta .t-hd .ptc,.t-ta .ent .pt{color:var(--teal-lt)}
.t-ta{border-left-color:var(--teal-lt);background:linear-gradient(135deg,rgba(0,184,196,.05),rgba(0,184,196,.01))}
.t-ta .ent .pb .fl{background:linear-gradient(90deg,var(--teal-dk),var(--teal-lt))}

/* ─── HM ─── */
.hm{margin-top:28px}
.hm-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.hm-hd h2{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:26px;letter-spacing:.04em;white-space:nowrap}
.hm-hd .hl{height:1px;flex:1;background:linear-gradient(90deg,var(--edge),transparent)}
.sd{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.sd s{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--dim);white-space:nowrap;font-variant-numeric:tabular-nums;text-decoration:none}
.sd .l{height:1px;flex:1;background:linear-gradient(90deg,var(--edge),transparent 80%)}
.hm-cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.hm-c{
  background:var(--card);border:1px solid var(--edge);border-radius:var(--rs);
  padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:all .25s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.hm-c:hover{background:var(--card-hi);transform:translateY(-2px);border-color:var(--edge-hi);box-shadow:0 10px 24px -8px rgba(0,0,0,.5)}
.hm-c img{width:24px;height:16px;border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.hm-ci{flex:1;min-width:0}
.hm-cn{font-weight:700;font-size:12px;letter-spacing:-.01em}
.hm-ct{font-size:9px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-cp{
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal-lt);
  line-height:1;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums;
}
.hm-cp small{font-size:7px;color:var(--dim);display:block;letter-spacing:.1em}

/* ─── MODAL ─── */
.mo{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s;padding:16px;
}
.mo.a{opacity:1;pointer-events:all}
.m{
  background:linear-gradient(145deg,#0E1A30,#060912);
  border:1px solid var(--edge);border-radius:24px;
  padding:36px 30px;max-width:440px;width:100%;
  position:relative;box-shadow:0 50px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
  transform:translateY(40px) scale(.94);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  max-height:90vh;overflow-y:auto;
}
.m::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold-lt),var(--gold),transparent);
  border-radius:24px 24px 0 0;
}
.mo.a .m{transform:translateY(0) scale(1)}
.mx{
  position:absolute;top:16px;right:18px;background:rgba(255,255,255,.05);border:1px solid var(--edge);
  color:var(--dim);font-size:18px;cursor:pointer;padding:6px 10px;
  border-radius:10px;transition:all .2s;font-family:inherit;line-height:1;z-index:2;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
}
.mx:hover{background:rgba(255,255,255,.12);color:#fff;transform:rotate(90deg)}
.mm{text-align:center}
.m-rank{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);letter-spacing:.1em}
.m-name{font-size:24px;font-weight:800;margin-top:4px;letter-spacing:-.02em}
.m-flags{display:flex;justify-content:center;gap:18px;margin:14px 0}
.m-fb{display:flex;flex-direction:column;align-items:center;gap:5px}
.m-fb img{width:52px;height:35px;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.m-fn{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.02em}
.m-fs{font-size:9px;font-weight:800;padding:2px 9px;border-radius:99px;letter-spacing:.04em}
.m-fs.go{background:rgba(0,184,196,.18);color:var(--teal-lt)}
.m-fs.no{background:rgba(74,90,112,.2);color:var(--dim2)}
.m-score{
  font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;
  background:linear-gradient(180deg,var(--gold-lt),var(--gold) 50%,#fff 85%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin:10px 0 4px;font-variant-numeric:tabular-nums;
  filter:drop-shadow(0 4px 20px rgba(253,184,36,.4));
}
.m-lbl{font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.m-bd{margin-top:18px;text-align:left}
.m-r2{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;gap:12px;
}
.m-r2:last-child{border:none}
.m-r2 .ml{color:var(--dim);flex-shrink:0}
.m-r2 .mv{font-weight:600;display:flex;align-items:center;gap:6px;text-align:right;justify-content:flex-end}
.m-r2 .mv.go{color:var(--teal-lt)}
.m-r2 .mv.go::after{content:'✓';font-size:11px;font-weight:900}
.m-r2 .mv.no{color:var(--dim2)}
.m-bar{
  width:80px;height:4px;border-radius:99px;
  background:rgba(255,255,255,.06);overflow:hidden;margin-top:2px;
}
.m-bar .fl{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.16,1,.3,1)}
.m-bar .fl.g{background:linear-gradient(90deg,var(--gold-dk),var(--gold-lt))}
.m-bar .fl.t{background:linear-gradient(90deg,var(--teal-dk),var(--teal-lt))}
.m-bar .fl.s{background:linear-gradient(90deg,var(--silver-dk),var(--silver))}

/* ─── CONFETTI ─── */
.cn{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cn i{position:absolute;top:-10px;border-radius:3px;opacity:.5;animation:cf linear infinite}
@keyframes cf{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(110vh) rotate(700deg)}}

/* ─── MOUSE GLOW ─── */
#glow{
  position:fixed;left:0;top:0;width:500px;height:500px;border-radius:50%;
  pointer-events:none;z-index:0;transform:translate(-250px,-250px);
  transition:transform .8s cubic-bezier(.16,1,.3,1);
  background:radial-gradient(circle,rgba(253,184,36,.08) 0%,transparent 65%);
  mix-blend-mode:screen;
}
@media(max-width:768px){#glow{display:none}}
.sparkle{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:sk 700ms ease-out forwards}
@keyframes sk{0%{opacity:1;transform:scale(1) translate(0,0)}100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy))}}

/* ─── STADIUM BEAMS ─── */
.beam{
  position:fixed;top:-10%;width:300px;height:80vh;
  background:linear-gradient(180deg,rgba(253,184,36,.04),transparent);
  transform-origin:top center;pointer-events:none;z-index:0;
  filter:blur(20px);
}
.beam.l{left:10%;transform:rotate(15deg);animation:beamSweep 8s ease-in-out infinite}
.beam.r{right:10%;transform:rotate(-15deg);animation:beamSweep 8s ease-in-out infinite reverse}
@keyframes beamSweep{0%,100%{opacity:.3}50%{opacity:.8}}

/* ─── FOOTER ─── */
.ft{
  text-align:center;margin-top:50px;color:var(--dim);font-size:11px;
  line-height:1.7;padding-top:24px;border-top:1px solid var(--edge);
  letter-spacing:.02em;
}
.ft b{color:#fff;font-weight:700}

/* ─── ANIMATIONS ─── */
.fi{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s cubic-bezier(.16,1,.3,1)}
.fi.v{opacity:1;transform:translateY(0)}

/* ─── EMPTY ─── */
.emp{text-align:center;padding:50px 20px;color:var(--dim)}
.emp .ei{font-size:48px;margin-bottom:12px;display:block}
.emp p{font-size:13px}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

/* ─── RWD ─── */
@media(max-width:820px){
  .pd{grid-template-columns:1fr;gap:14px}
  .pd-1{order:-1}
  .pd-c{padding:22px 18px}
  .pd-1{padding:28px 22px}
}
@media(min-width:520px){.t-row.c2{grid-template-columns:1fr 1fr}}
@media(max-width:519px){
  .t-row.c2{grid-template-columns:1fr}
  .hm-cg{grid-template-columns:1fr}
  .m{padding:26px 18px}
  .wrap{padding:28px 12px 40px}
  .h-badge{font-size:10px;padding:6px 16px}
  .sf{flex-direction:column}
  .srch{max-width:100%}
  .pd-c{padding:18px 14px}
  .pd-1{padding:22px 16px}
  .pd-flags{gap:6px}
  .pd-f{padding:7px 9px 5px}
}
@media(max-width:399px){
  .pd-flags{flex-direction:column;align-items:center}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>
<div class="beam l"></div>
<div class="beam r"></div>
<div class="cn" id="cn"></div>
<div id="glow"></div>
<div class="wrap">
  <header class="header">
    <div class="h-trophy">🏆</div>
    <div class="h-badge" role="status">⚽ FIFA 2026 · Office Pool · Round of 32</div>
    <h1>Leaderboard</h1>
    <p class="h-sub"><span class="pulse"></span> <b id="pc">—</b> · Two nations each · Group Stage + Round of 32</p>
  </header>
  <div class="sf" role="search">
    <div class="srch">
      <span class="ico" aria-hidden="true">&#x1F50D;</span>
      <input type="text" id="s" placeholder="Search name or nation..." autocomplete="off" aria-label="Search players">
    </div>
    <div class="fp" role="group" aria-label="Filter players">
      <button data-f="all" class="a" aria-pressed="true">All</button>
      <button data-f="adv" aria-pressed="false">Advancers</button>
      <button data-f="noa" aria-pressed="false">Non-advancers</button>
    </div>
    <div id="scnt"></div>
  </div>
  <div id="app" role="main" aria-label="Leaderboard"></div>
  <footer class="ft">
    <b id="fc">—</b> · Two nations per player · Total = Group Stage + Round of 32<br>
    Last updated from pool sheet · &#x26BD; FIFA World Cup 2026
  </footer>
</div>
<div class="mo" id="mo" role="dialog" aria-modal="true" aria-label="Player details">
  <div class="m" id="md">
    <button class="mx" id="mx" aria-label="Close modal">&times;</button>
    <div id="mb"></div>
  </div>
</div>

<script>
/* ─── CONFETTI ─── */
(function(cn){
  if(!cn)return;
  var cx=['#FDB824','#00B8C4','#FFD96A','#fff','#48D1CC','#FF6B6B','#FFD700'];
  var n=window.innerWidth<480?16:32;
  for(var i=0;i<n;i++){
    var s=document.createElement('i');
    s.style.left=Math.random()*100+'%';
    s.style.background=cx[Math.floor(Math.random()*cx.length)];
    var d=(6+Math.random()*10).toFixed(2);
    s.style.animationDuration=d+'s';
    s.style.animationDelay=(-Math.random()*d)+'s';
    s.style.height=(4+Math.random()*12)+'px';
    s.style.width=(3+Math.random()*7)+'px';
    s.style.opacity=(.15+Math.random()*.35).toFixed(2);
    if(Math.random()>.55)s.style.borderRadius='50%';
    if(Math.random()>.7)s.style.boxShadow='0 0 8px '+s.style.background;
    cn.appendChild(s);
  }
})(document.getElementById('cn'));

/* ─── MOUSE EFFECTS ─── */
(function(){var e=document.getElementById('cn');if(!e)return;var n=null;document.addEventListener('mousemove',function(t){n&&cancelAnimationFrame(n);n=requestAnimationFrame(function(){var r=(t.clientX/window.innerWidth-.5)*30,o=(t.clientY/window.innerHeight-.5)*16;e.style.transform='translate('+r+'px,'+o+'px)';n=null})})})();
(function(){var e=document.getElementById('glow');if(!e)return;if('ontouchstart'in window||navigator.maxTouchPoints>0){e.style.display='none';return}var n=null;document.addEventListener('mousemove',function(t){n&&cancelAnimationFrame(n);n=requestAnimationFrame(function(){e.style.transform='translate('+(t.clientX-250)+'px,'+(t.clientY-250)+'px)';n=null})})})();
document.addEventListener('click',function(e){if('ontouchstart'in window||navigator.maxTouchPoints>0)return;var t=['#FDB824','#00B8C4','#FFD96A','#48D1CC','#fff'],n=8+Math.floor(Math.random()*6);for(var r=0;r<n;r++){var o=document.createElement('i'),sz=4+3*Math.random(),a=Math.random()*Math.PI*2,u=50+50*Math.random(),c=Math.cos(a)*u,l=Math.sin(a)*u;o.className='sparkle';o.style.left=e.clientX+'px';o.style.top=e.clientY+'px';o.style.width=sz+'px';o.style.height=sz+'px';o.style.background=t[Math.floor(Math.random()*t.length)];o.style.boxShadow='0 0 8px '+o.style.background;o.style.setProperty('--dx',c+'px');o.style.setProperty('--dy',l+'px');document.body.appendChild(o);setTimeout(function(s){s.remove()},700,o)}});

var CC={
  France:'fr',Mexico:'mx',Argentina:'ar',Switzerland:'ch',
  England:'gb-eng',Scotland:'gb-sct',Colombia:'co',Norway:'no',
  'Ivory Coast':'ci',Spain:'es',Morocco:'ma',Sweden:'se',
  Bosnia:'ba',Australia:'au','Congo DR':'cd','South Africa':'za',
  Ecuador:'ec',Germany:'de',USA:'us',Brazil:'br',Japan:'jp',
  Netherlands:'nl',Egypt:'eg',Portugal:'pt',Canada:'ca',
  Austria:'at',Algeria:'dz',Croatia:'hr',Paraguay:'py',
  Curaçao:'cw',Czechia:'cz','Cabo Verde':'cv',Iran:'ir',
  'Türkiye':'tr',Turkiye:'tr',Senegal:'sn',Uzbekistan:'uz',
  Panama:'pa',Uruguay:'uy',Belgium:'be',Ghana:'gh',Qatar:'qa',
  'New Zealand':'nz','Korea Republic':'kr','Saudi Arabia':'sa',
  Haiti:'ht',Jordan:'jo',Tunisia:'tn',Iraq:'iq'
};

function gw(w){return w>40?80:w>20?40:20}
function fe(n,w){
  var c=CC[n];if(!c)return'';
  var fw=gw(w);
  var h=Math.round(w*2/3);
  return '<img src="https://flagcdn.com/w'+fw+'/'+c+'.png" alt="'+es(n)+'" loading="lazy" width="'+w+'" height="'+h+'" style="width:'+w+'px;height:'+h+'px;border-radius:3px;box-shadow:0 3px 8px rgba(0,0,0,.4);vertical-align:middle">';
}

var pl=[],_f='all',_q='';
function ld(){
  fetch('data.json?'+Date.now()).then(function(r){return r.json()}).then(function(d){
    pl=d.players;
    document.getElementById('pc').textContent=d.totalPlayers+' players';
    document.getElementById('fc').textContent=d.totalPlayers+' participants';
    document.getElementById('s').addEventListener('input',function(){_q=this.value;f()});
    document.querySelectorAll('.fp button').forEach(function(b){
      b.addEventListener('click',function(){
        document.querySelectorAll('.fp button').forEach(function(x){x.classList.remove('a');x.setAttribute('aria-pressed','false')});
        this.classList.add('a');this.setAttribute('aria-pressed','true');
        _f=this.getAttribute('data-f');f();
      });
    });
    f();
  }).catch(function(){
    document.getElementById('app').innerHTML='<div class="emp"><span class="ei">&#x26A0;&#xFE0F;</span><p>Could not load data. Make sure data.json is present.</p></div>';
  });
}

function f(){
  var fl=pl;
  if(_q.trim()){
    var q=_q.toLowerCase().trim();
    fl=fl.filter(function(p){
      return p.name.toLowerCase().includes(q)||p.pair.toLowerCase().includes(q)||
        p.teams.some(function(t){return t.toLowerCase().includes(q)});
    });
  }
  if(_f==='adv')fl=fl.filter(function(p){return p.t1_r32||p.t2_r32});
  if(_f==='noa')fl=fl.filter(function(p){return !p.t1_r32&&!p.t2_r32});
  document.getElementById('scnt').textContent=fl.length!==pl.length?'Showing '+fl.length+' of '+pl.length+' players':'';
  if(!fl.length){
    document.getElementById('app').innerHTML='<div class="emp"><span class="ei">&#x1F50D;</span><p>No players match your search.</p></div>';
    return;
  }
  var g=gb(fl);
  document.getElementById('app').innerHTML=rP(g)+rT(g)+rHM(g);
  setTimeout(function(){
    sa();
    animateScores();
  },30);
}

function gb(a){
  var m={};
  a.forEach(function(p){if(!m[p.total])m[p.total]=[];m[p.total].push(p)});
  return Object.keys(m).map(Number).sort(function(a,b){return b-a}).map(function(k){return{score:k,players:m[k]}}).map(function(gr,idx){
    gr.players.forEach(function(p,i){p.rank=idx===0?1:0});return gr;
  });
}

function fg(g,s){for(var i=0;i<g.length;i++){if(g[i].score===s)return g[i]}return null}

function es(s){
  return String(s).replace(/[&<>"']/g,function(m){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m
  });
}

/* ─── RENDER PODIUM ─── */
function rP(g){
  var g1=fg(g,24),g2=fg(g,22),g3=fg(g,21);
  if(!g1)return'';
  var p1=g1.players[0];
  var p2=g2?g2.players:null,p3=g3?g3.players[0]:null;
  return '<div class="fi pd">'+
    (p2?rPC(p2,'2'):'')+
    rPC([p1],'1')+
    (p3?rPC([p3],'3'):'')+
    '</div>';
}

function rPC(ps,r){
  var p=ps[0],is1=r==='1';
  var cls='pd-c pd-'+r;
  var h='<div class="'+cls+'" onclick="oM('+p.chit+')">'+
    '<div class="pd-icon">'+(r==='1'?'👑&#x1F3C6;':r==='2'?'&#x1F948;':'&#x1F949;')+'</div>'+
    '<div class="pd-tag">'+(r==='1'?'&#x1F947; Champion':r==='2'?'&#x1F948; Runners-Up':'&#x1F949; 3rd Place')+'</div>'+
    '<div class="pd-name">'+es(p.name)+'</div>'+
    '<div class="pd-flags">'+
    '<div class="pd-f">'+
      fe(p.teams[0].trim(),is1?58:48)+
      '<span class="pd-fn">'+es(p.teams[0].trim())+'</span>'+
      '<span class="pd-fb '+(p.t1_r32?'go':'no')+'">'+(p.t1_r32?'R32':'GS only')+'</span>'+
    '</div><div class="pd-f">'+
      fe(p.teams[1].trim(),is1?58:48)+
      '<span class="pd-fn">'+es(p.teams[1].trim())+'</span>'+
      '<span class="pd-fb '+(p.t2_r32?'go':'no')+'">'+(p.t2_r32?'R32':'GS only')+'</span>'+
    '</div>'+
    '</div>'+
    '<div class="pd-sc" data-cu="'+p.total+'">0</div><div class="pd-lbl">POINTS</div>'+
    '<div class="pd-bk">'+
    '<span>GS <b>'+(p.t1_gs+p.t2_gs)+'</b></span>'+
    '<span>R32 <b>'+((p.t1_r32||0)+(p.t2_r32||0))+'</b></span>'+
    '<span>Chit #<b>'+p.chit+'</b></span>'+
    '</div>';
  if(ps.length>1){
    h+='<div class="pd-j">';
    for(var i=1;i<ps.length;i++){
      h+='<div class="pd-jt" onclick="event.stopPropagation();oM('+ps[i].chit+')">'+
        fe(ps[i].teams[0].trim(),20)+fe(ps[i].teams[1].trim(),20)+
        '<span class="pd-jn">'+es(ps[i].name)+'</span>'+
        '<span class="pd-jp">'+ps[i].total+'</span></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function rT(g){
  var ts=[
    {l:'4th Place',s:20,e:'&#x1F3C5;',c:'t-ta'},
    {l:'5th Place',s:19,e:'&#x1F3C5;',c:'t-s'},
    {l:'Joint 6th Place',s:18,e:'&#x1F3C5;',c:'t-b'}
  ];
  var h='';
  ts.forEach(function(t){
    var gr=fg(g,t.s);
    if(!gr)return;
    h+='<div class="fi t-card '+t.c+'"><div class="t-hd">'+
      '<span class="m">'+t.e+'</span><span class="l">'+t.l+'</span><span class="ptc" data-cu="'+t.s+'">0</span></div>'+
      '<div class="t-body"><div class="t-row c2">';
    gr.players.forEach(function(p){
      var mx2=24;
      h+='<div class="ent" onclick="oM('+p.chit+')">'+
        '<div class="ef">'+
        '<div class="ew">'+fe(p.teams[0].trim(),30)+(p.t1_r32?'<span class="eb">&#x2713;</span>':'')+'</div>'+
        '<div class="ew">'+fe(p.teams[1].trim(),30)+(p.t2_r32?'<span class="eb">&#x2713;</span>':'')+'</div>'+
        '</div>'+
        '<div class="i"><div class="nm">'+es(p.name)+'</div><div class="ad">'+
        '<span class="ab '+(p.t1_r32||p.t2_r32?'go':'no')+'">'+
        ((p.t1_r32?1:0)+(p.t2_r32?1:0))+'/'+2+' R32</span></div></div>'+
        '<div style="text-align:right"><div class="pt" data-cu="'+p.total+'">0</div><div class="pb"><div class="fl" style="width:0%" data-target="'+Math.round(p.total/mx2*100)+'%"></div></div></div>'+
        '</div>';
    });
    h+='</div></div></div>';
  });
  if(h)h='<div class="t-grid">'+h+'</div>';
  return h;
}

function rHM(g){
  var h='<div class="fi hm"><div class="hm-hd"><h2>&#x2728; Honorable Mentions</h2><div class="hl"></div></div>';
  var any=false;
  g.forEach(function(gr){
    if(gr.score>=18)return;
    any=true;
    h+='<div class="sd"><s>'+gr.score+' pts</s><div class="l"></div></div><div class="hm-cg">';
    gr.players.forEach(function(p){
      h+='<div class="hm-c" onclick="oM('+p.chit+')">'+
        fe(p.teams[0].trim(),24)+fe(p.teams[1].trim(),24)+
        '<div class="hm-ci"><div class="hm-cn">'+es(p.name)+'</div><div class="hm-ct">'+es(p.pair)+'</div></div>'+
        '<div class="hm-cp">'+gr.score+'<small>PTS</small></div></div>';
    });
    h+='</div>';
  });
  if(!any){h+='<div style="text-align:center;color:var(--dim);padding:20px;font-size:13px">No players below this tier.</div>'}
  h+='</div>';
  return h;
}

/* ─── ANIMATE SCORES ─── */
function animateScores(){
  document.querySelectorAll('[data-cu]').forEach(function(el){
    var target=parseInt(el.getAttribute('data-cu'));
    if(!target||target<0)return;
    if(el.classList.contains('fl'))return;
    var cur=0,dur=Math.min(1200,400+target*30),start=null;
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/dur,1);
      var eased=1-Math.pow(1-p,3);
      el.textContent=Math.round(eased*target);
      if(p<1)requestAnimationFrame(step);
      else el.textContent=target;
    }
    requestAnimationFrame(step);
  });
  setTimeout(function(){
    document.querySelectorAll('.pb .fl[data-target]').forEach(function(el){
      el.style.width=el.getAttribute('data-target');
      el.removeAttribute('data-target');
    });
  },100);
}

/* ─── MODAL ─── */
function oM(chit){
  var p=pl.find(function(x){return x.chit===chit});
  if(!p)return;
  var r=p.rank||1,ord=['th','st','nd','rd'],sx=ord[(r%10>3||Math.floor(r/10)%10===1)?0:r%10]||'th',t=p.teams;
  document.getElementById('mb').innerHTML=
    '<div class="mm">'+
    '<div class="m-rank">#'+r+sx+' Place</div>'+
    '<div class="m-name">'+es(p.name)+'</div>'+
    '<div class="m-flags">'+
    '<div class="m-fb">'+fe(t[0].trim(),52)+'<span class="m-fn">'+es(t[0].trim())+'</span><span class="m-fs '+(p.t1_r32?'go':'no')+'">'+(p.t1_r32?'R32 &#x2713;':'GS Only')+'</span></div>'+
    '<div class="m-fb">'+fe(t[1].trim(),52)+'<span class="m-fn">'+es(t[1].trim())+'</span><span class="m-fs '+(p.t2_r32?'go':'no')+'">'+(p.t2_r32?'R32 &#x2713;':'GS Only')+'</span></div>'+
    '</div>'+
    '<div class="m-score" data-cu="'+p.total+'">0</div><div class="m-lbl">TOTAL POINTS</div>'+
    '</div>'+
    '<div class="m-bd">'+
    '<div class="m-r2"><span class="ml">Chit #</span><span class="mv">'+p.chit+'</span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[0])+' Group Stage</span><span class="mv">'+p.t1_gs+' pts <div class="m-bar"><div class="fl g" style="width:'+Math.round(p.t1_gs/9*100)+'%"></div></div></span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[1])+' Group Stage</span><span class="mv">'+p.t2_gs+' pts <div class="m-bar"><div class="fl g" style="width:'+Math.round(p.t2_gs/9*100)+'%"></div></div></span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[0])+' Round of 32</span><span class="mv '+(p.t1_r32?'go':'no')+'">'+(p.t1_r32!==null&&p.t1_r32!==undefined?p.t1_r32+' pts <div class="m-bar"><div class="fl t" style="width:'+Math.round((p.t1_r32||0)/3*100)+'%"></div></div>':'Did not advance')+'</span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[1])+' Round of 32</span><span class="mv '+(p.t2_r32?'go':'no')+'">'+(p.t2_r32!==null&&p.t2_r32!==undefined?p.t2_r32+' pts <div class="m-bar"><div class="fl t" style="width:'+Math.round((p.t2_r32||0)/3*100)+'%"></div></div>':'Did not advance')+'</span></div>'+
    '</div>';
  document.getElementById('mo').classList.add('a');
  document.getElementById('mx').focus();
  setTimeout(function(){
    var el=document.querySelector('.m-score[data-cu]');
    if(el){
      var target=parseInt(el.getAttribute('data-cu'));
      var cur=0,dur=900,start=null;
      function step(ts){
        if(!start)start=ts;
        var p=Math.min((ts-start)/dur,1);
        var eased=1-Math.pow(1-p,3);
        el.textContent=Math.round(eased*target);
        if(p<1)requestAnimationFrame(step);
        else el.textContent=target;
      }
      requestAnimationFrame(step);
    }
  },150);
}

document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)cM()});
document.getElementById('mx').addEventListener('click',cM);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')cM();
  if(e.key==='Tab'&&document.getElementById('mo').classList.contains('a')){
    var f=document.querySelectorAll('#md button,#md input,#md a');
    if(!f.length)return;
    var fi=Array.prototype.indexOf.call(f,document.activeElement);
    if(e.shiftKey&&fi===0){e.preventDefault();f[f.length-1].focus()}
    else if(!e.shiftKey&&fi===f.length-1){e.preventDefault();f[0].focus()}
  }
});
function cM(){document.getElementById('mo').classList.remove('a')}

/* ─── STAGGER REVEAL ─── */
function sa(){
  var els=document.querySelectorAll('.fi:not(.v)');
  Array.prototype.forEach.call(els,function(el,i){
    new IntersectionObserver(function(e){
      if(e[0].isIntersecting){
        el.style.transitionDelay=((i%12)*70)+'ms';
        el.classList.add('v');
        this.unobserve(el);
      }
    },{threshold:.05}).observe(el);
  });
}

ld();
</script>
