<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Office Pool — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
:root{
  --gold:#FDB824;
  --gold-dk:#D49A10;
  --gold-glow:rgba(253,184,36,.35);
  --teal:#00929F;
  --teal-dk:#00707A;
  --teal-glow:rgba(0,146,159,.3);
  --bg1:#080C18;
  --bg2:#0D1528;
  --bg3:#111D35;
  --card:rgba(255,255,255,.04);
  --card-border:rgba(255,255,255,.07);
  --card-hover:rgba(255,255,255,.08);
  --ink:#FFFFFF;
  --muted:#8899B4;
  --radius:18px;
  --radius-sm:12px;
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:var(--bg1);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1000px 500px at 50% -150px, rgba(253,184,36,.08), transparent 60%),
    radial-gradient(700px 500px at 10% 20%, rgba(0,146,159,.06), transparent 50%),
    radial-gradient(700px 500px at 90% 20%, rgba(253,184,36,.04), transparent 50%),
    radial-gradient(900px 600px at 50% 80%, rgba(0,146,159,.03), transparent 50%);
}
.wrap{max-width:1040px;margin:0 auto;padding:40px 20px 60px;position:relative;z-index:1}

/* ─── HEADER ─── */
.header{text-align:center;margin-bottom:56px}
.kicker{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--bg1);
  background:linear-gradient(90deg,var(--gold),var(--teal));
  padding:7px 16px;border-radius:999px;margin-bottom:20px;
}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(56px,10vw,112px);font-weight:400;line-height:.9;
  background:linear-gradient(180deg,#fff 20%,var(--gold) 80%,var(--gold-dk) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 20px var(--gold-glow));
  text-transform:uppercase;
}
.sub{
  margin-top:12px;color:var(--muted);font-size:clamp(14px,2vw,17px);
  max-width:620px;margin-inline:auto;line-height:1.55;
}
.sub b{color:#fff}
.pulse-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--teal);margin-right:6px;
  animation:pulse 1.8s ease-in-out infinite;
  vertical-align:middle;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ─── SEARCH ─── */
.search-wrap{max-width:420px;margin:0 auto 44px;position:relative}
.search-wrap input{
  width:100%;padding:14px 18px 14px 46px;border-radius:var(--radius);
  border:1px solid var(--card-border);background:var(--card);
  color:#fff;font-size:15px;font-family:inherit;outline:none;
  backdrop-filter:blur(12px);transition:border-color .25s;
}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap .icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:18px;pointer-events:none;
}
#search-count{text-align:center;font-size:13px;color:var(--muted);margin-top:8px}

/* ─── SECTION TITLE ─── */
.section{
  margin-bottom:16px;display:flex;align-items:center;gap:14px;
}
.section h2{
  font-family:'Bebas Neue',sans-serif;font-size:30px;font-weight:400;
  letter-spacing:.04em;white-space:nowrap;
}
.section .line{height:1px;flex:1;background:linear-gradient(90deg,var(--card-border),transparent)}

/* ─── CHAMPION ─── */
.champion-wrap{position:relative;margin-bottom:32px}
.champion{
  background:linear-gradient(135deg,rgba(253,184,36,.12),rgba(253,184,36,.04));
  border:1px solid rgba(253,184,36,.25);
  border-radius:24px;padding:40px 32px;text-align:center;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 60px rgba(253,184,36,.1),inset 0 1px 0 rgba(253,184,36,.2);
  position:relative;overflow:hidden;
}
.champion::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(600px 300px at 50% -50px, rgba(253,184,36,.15), transparent 60%);
  pointer-events:none;
}
.champ-crown{font-size:48px;margin-bottom:6px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.champ-badge{
  display:inline-block;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--bg1);background:var(--gold);padding:4px 14px;border-radius:999px;margin-bottom:12px;
}
.champ-name{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6vw,64px);
  color:#fff;line-height:1;
}
.champ-teams{font-size:18px;color:var(--muted);margin-top:8px}
.champ-teams .flag{margin:0 2px}
.champ-score{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,7vw,72px);
  background:linear-gradient(180deg,var(--gold),#fff 60%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;margin-top:6px;
}
.champ-sub{font-size:13px;color:var(--muted);letter-spacing:.1em;margin-top:2px}

/* ─── GLASS PODIUM ─── */
.podium-grid{
  display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:48px;
}
.glass-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:20px 24px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:transform .25s,box-shadow .25s;
}
.glass-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.glass-card .card-head{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.glass-card .card-rank{
  font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--gold);
}
.glass-card .card-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.glass-card .card-pts{
  font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;line-height:1;
  margin-left:auto;
}
.glass-card .card-players{
  display:flex;flex-wrap:wrap;gap:10px;
}
.glass-card .player-chip{
  background:rgba(255,255,255,.04);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:12px 14px;flex:1;min-width:180px;
  cursor:pointer;transition:background .2s;
}
.glass-card .player-chip:hover{background:var(--card-hover)}
.player-chip .pc-name{font-weight:600;font-size:14px}
.player-chip .pc-teams{font-size:12px;color:var(--muted);margin-top:3px}
.player-chip .pc-teams .flag{margin:0 1px}

/* tier-specific accents */
.tier-gold{
  border-color:rgba(253,184,36,.2);
  background:linear-gradient(135deg,rgba(253,184,36,.08),rgba(253,184,36,.02));
}
.tier-gold .card-rank{color:var(--gold)}
.tier-gold .card-pts{color:var(--gold)}
.tier-silver .card-rank{color:#D2DBE6}
.tier-silver .card-pts{color:#D2DBE6}
.tier-bronze .card-rank{color:#E0935A}
.tier-bronze .card-pts{color:#E0935A}
.tier-teal{
  border-color:rgba(0,146,159,.2);
  background:linear-gradient(135deg,rgba(0,146,159,.06),rgba(0,146,159,.02));
}
.tier-teal .card-rank{color:var(--teal)}
.tier-teal .card-pts{color:var(--teal)}

/* ─── HONOURABLE MENTIONS ─── */
.hm-section{margin-top:32px}
.hm-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;
}
.hm-card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:12px 14px;
  backdrop-filter:blur(8px);cursor:pointer;transition:all .2s;
}
.hm-card:hover{background:var(--card-hover);transform:translateY(-1px)}
.hm-card .hm-name{font-weight:600;font-size:13px}
.hm-card .hm-teams{font-size:11px;color:var(--muted);margin-top:2px}
.hm-card .hm-pts{
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--teal);line-height:1;
  margin-top:6px;
}
.hm-card .hm-pts small{font-size:9px;color:var(--muted);letter-spacing:.08em}
.hm-group-label{
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);
  margin:18px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.hm-group-label .g-line{height:1px;flex:1;background:var(--card-border)}

/* ─── FLAGS ─── */
.flag{display:inline-block;font-size:1.2em;line-height:1;vertical-align:middle}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
  padding:20px;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:linear-gradient(135deg,#0F1A30,#0A0E1A);
  border:1px solid var(--card-border);border-radius:24px;
  padding:36px 32px;max-width:440px;width:100%;
  position:relative;box-shadow:0 40px 80px rgba(0,0,0,.5);
  transform:translateY(16px);transition:transform .3s;
}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-close{
  position:absolute;top:16px;right:20px;background:none;border:none;
  color:var(--muted);font-size:24px;cursor:pointer;font-family:inherit;
  transition:color .2s;
}
.modal-close:hover{color:#fff}
.modal .m-rank{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  color:var(--gold);letter-spacing:.08em;
}
.modal .m-name{font-size:24px;font-weight:700;margin-top:4px}
.modal .m-teams{font-size:15px;color:var(--muted);margin-top:6px}
.modal .m-teams .flag{font-size:1.4em;margin:0 2px}
.modal .m-total{
  font-family:'Bebas Neue',sans-serif;font-size:52px;
  background:linear-gradient(180deg,var(--gold),#fff 60%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;margin:16px 0 8px;
}
.modal .m-sub{font-size:12px;color:var(--muted);letter-spacing:.1em}
.modal .m-breakdown{margin-top:16px}
.modal .m-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:14px;
}
.modal .m-row:last-child{border:none}
.modal .m-row .m-label{color:var(--muted)}
.modal .m-row .m-val{font-weight:600}
.modal .m-row .m-val.adv{color:var(--teal)}

/* ─── CONFETTI ─── */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.confetti i{
  position:absolute;top:-10px;width:8px;height:12px;border-radius:2px;
  opacity:.8;animation:confettiFall linear infinite;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0)}
  100%{transform:translateY(110vh) rotate(600deg)}
}

/* ─── FOOTER ─── */
footer{text-align:center;margin-top:48px;color:var(--muted);font-size:13px;line-height:1.7}
footer b{color:#fff}

/* ─── SCROLL ANIM ─── */
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ─── RESPONSIVE ─── */
@media(min-width:640px){
  .podium-grid{grid-template-columns:1fr 1fr}
  .podium-grid .span-2{grid-column:1/-1}
}
@media(max-width:480px){
  .wrap{padding:24px 14px 40px}
  .champion{padding:28px 20px}
  .modal{padding:28px 20px}
  .glass-card{padding:16px 18px}
  body::before{background-size:200% 50%,200% 50%,200% 50%,200% 50%}
}
</style>
</head>
<body>
<div class="confetti" id="confetti"></div>

<div class="wrap">
  <header class="header">
    <span class="kicker">⚽ Office Pool · Round of 32</span>
    <h1>Leaderboard</h1>
    <p class="sub"><span class="pulse-dot"></span> <b id="player-count">—</b> · Two nations each · Group Stage + Round of 32 points combined</p>
  </header>

  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search by name or nation..." autocomplete="off">
    <div id="search-count"></div>
  </div>

  <div id="app"></div>

  <footer>
    <b id="footer-count">—</b> · Drawn two nations each · Total = Group Stage + Round of 32 points<br>
    Last updated from the official pool sheet · ⚽ FIFA World Cup 2026
  </footer>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ─── CONFITTI ─── */
(function(){
  var c=document.getElementById('confetti');
  if(!c)return;
  var colors=['#FDB824','#00929F','#FF6B6B','#FFFFFF','#48D1CC','#FFD700'];
  var n=window.innerWidth<480?20:40;
  for(var i=0;i<n;i++){
    var s=document.createElement('i');
    s.style.left=Math.random()*100+'%';
    s.style.background=colors[Math.floor(Math.random()*colors.length)];
    var dur=(4+Math.random()*6).toFixed(2);
    s.style.animationDuration=dur+'s';
    s.style.animationDelay=(-Math.random()*dur)+'s';
    s.style.height=(6+Math.random()*10)+'px';
    s.style.width=(5+Math.random()*6)+'px';
    s.style.opacity=(0.4+Math.random()*0.5).toFixed(2);
    if(Math.random()>.6)s.style.borderRadius='50%';
    c.appendChild(s);
  }
})();

/* ─── FLAG EMOJI MAP ─── */
var COUNTRY_CODES={
  'France':'FR','Mexico':'MX','Argentina':'AR','Switzerland':'CH',
  'England':'GB','Colombia':'CO','Norway':'NO','Ivory Coast':'CI',
  'Spain':'ES','Morocco':'MA','Sweden':'SE','Bosnia':'BA',
  'Australia':'AU','Congo DR':'CD','South Africa':'ZA','Ecuador':'EC',
  'Germany':'DE','USA':'US','Brazil':'BR','Japan':'JP',
  'Netherlands':'NL','Egypt':'EG','Portugal':'PT','Canada':'CA',
  'Austria':'AT','Algeria':'DZ','Croatia':'HR','Paraguay':'PY',
  'Scotland':'GB','Curaçao':'CW','Czechia':'CZ','Cabo Verde':'CV',
  'Iran':'IR','Türkiye':'TR','Turkiye':'TR','Senegal':'SN',
  'Uzbekistan':'UZ','Panama':'PA','Uruguay':'UY','Belgium':'BE',
  'Ghana':'GH','Qatar':'QA','New Zealand':'NZ','Korea Republic':'KR',
  'Saudi Arabia':'SA','Haiti':'HT','Jordan':'JO','Tunisia':'TN',
  'Iraq':'IQ'
};
function flagEmoji(name){
  var code=COUNTRY_CODES[name];
  if(!code)return'🏳️';
  if(code==='GB'){
    return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
  }
  var cp=code.toUpperCase().split('').map(function(c){return 127397+c.charCodeAt(0)});
  return String.fromCodePoint.apply(String,cp);
}
function renderFlags(teams){
  return teams.map(function(t){return'<span class="flag">'+flagEmoji(t.trim())+'</span>'}).join(' ');
}

/* ─── STATE ─── */
var data=null;
var players=[];

/* ─── FETCH DATA ─── */
function loadData(){
  fetch('data.json?'+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      data=d;
      players=d.players;
      document.getElementById('player-count').textContent='89 players';
      document.getElementById('footer-count').textContent='89 participants';
      render();
      document.getElementById('search').addEventListener('input',onSearch);
      initFadeIns();
    })
    .catch(function(e){
      document.getElementById('app').innerHTML=
        '<div style="text-align:center;padding:60px 20px;color:var(--muted)">'+
        '<div style="font-size:40px;margin-bottom:12px">⚠️</div>'+
        'Could not load data. Make sure data.json is present.</div>';
    });
}

/* ─── RENDER ─── */
function render(){
  var html='';
  var grouped=groupByScore(players);
  html+=renderChampion(grouped);
  html+=renderTiers(grouped);
  html+=renderHonorable(grouped);
  document.getElementById('app').innerHTML=html;
}

function groupByScore(arr){
  var map={};
  arr.forEach(function(p){
    if(!map[p.total])map[p.total]=[];
    map[p.total].push(p);
  });
  var keys=Object.keys(map).map(Number).sort(function(a,b){return b-a});
  var result=[];
  keys.forEach(function(k){result.push({score:k,players:map[k]})});
  return result;
}

function renderChampion(groups){
  var g=groups[0];
  if(!g||g.players.length>4||g.score<18)return'';
  var p=g.players[0];
  var teams=p.teams;
  return'<div class="fade-in champion-wrap">'+
    '<div class="champion">'+
    '<span class="champ-crown">👑</span>'+
    '<div class="champ-badge">🥇 Champion</div>'+
    '<div class="champ-name">'+esc(p.name)+'</div>'+
    '<div class="champ-teams">'+renderFlags(teams)+' '+esc(p.pair)+'</div>'+
    '<div class="champ-score" data-count="'+p.total+'">'+p.total+'</div>'+
    '<div class="champ-sub">TOTAL POINTS</div>'+
    '</div></div>';
}

function renderTiers(groups){
  var tiers=[
    {label:'Joint Runners-Up',score:22,emoji:'🥈',cls:'tier-silver'},
    {label:'3rd Place',score:21,emoji:'🥉',cls:'tier-bronze'},
    {label:'Joint 4th Place',score:20,emoji:'🏅',cls:'tier-teal'},
    {label:'5th Place',score:19,emoji:'🏅',cls:'tier-teal'},
    {label:'Joint 6th Place',score:18,emoji:'🏅',cls:'tier-teal'}
  ];
  var html='<div class="podium-grid">';
  tiers.forEach(function(t){
    var g=findGroup(groups,t.score);
    if(!g)return;
    var span=g.players.length>2?'span-2':'';
    html+='<div class="fade-in glass-card '+t.cls+' '+span+'">'+
      '<div class="card-head">'+
      '<span class="card-rank">'+t.emoji+' '+t.label+'</span>'+
      '<span class="card-pts" data-count="'+t.score+'">'+t.score+'</span>'+
      '</div>'+
      '<div class="card-players">';
    g.players.forEach(function(p){
      html+='<div class="player-chip" onclick="openModal('+p.chit+')">'+
        '<div class="pc-name">'+esc(p.name)+'</div>'+
        '<div class="pc-teams">'+renderFlags(p.teams)+' '+esc(p.pair)+'</div>'+
        '</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function renderHonorable(groups){
  var html='<div class="hm-section fade-in">'+
    '<div class="section"><h2>🌟 Honorable Mentions</h2><div class="line"></div></div>';
  var started=false;
  groups.forEach(function(g){
    if(g.score>=18)return;
    if(!started){started=true;}
    html+='<div class="hm-group-label"><span>'+g.score+' pts</span><span class="g-line"></span></div>'+
      '<div class="hm-grid">';
    g.players.forEach(function(p){
      html+='<div class="hm-card" onclick="openModal('+p.chit+')">'+
        '<div class="hm-name">'+esc(p.name)+'</div>'+
        '<div class="hm-teams">'+renderFlags(p.teams)+' '+esc(p.pair)+'</div>'+
        '<div class="hm-pts">'+g.score+' <small>PTS</small></div>'+
        '</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function findGroup(groups,score){
  for(var i=0;i<groups.length;i++){
    if(groups[i].score===score)return groups[i];
  }
  return null;
}

function esc(s){return String(s).replace(/[&<>"']/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m})}

/* ─── SEARCH ─── */
function onSearch(){
  var q=document.getElementById('search').value.toLowerCase().trim();
  if(!q){
    render();
    document.getElementById('search-count').textContent='';
    initFadeIns();
    return;
  }
  var filtered=players.filter(function(p){
    return p.name.toLowerCase().includes(q)||
      p.pair.toLowerCase().includes(q)||
      p.teams.some(function(t){return t.toLowerCase().includes(q)});
  });
  document.getElementById('search-count').textContent='Showing '+filtered.length+' of '+players.length+' players';
  var grouped=groupByScore(filtered);
  var html='';
  if(filtered.length===0){
    html='<div style="text-align:center;padding:40px;color:var(--muted)">No players match your search.</div>';
  } else {
    html+=renderChampion(groupByScore(filtered));
    html+=renderTiers(groupByScore(filtered));
    html+=renderHonorable(groupByScore(filtered));
  }
  document.getElementById('app').innerHTML=html;
}

/* ─── MODAL ─── */
function openModal(chit){
  var p=players.find(function(p){return p.chit===chit});
  if(!p)return;
  var r=p.rank;
  var ord=['th','st','nd','rd'];
  var suffix=ord[(r%10>3||Math.floor(r/10)%10===1)?0:r%10]||'th';
  var body=document.getElementById('modal-body');
  body.innerHTML=
    '<div class="m-rank">#'+r+suffix+' Place</div>'+
    '<div class="m-name">'+esc(p.name)+'</div>'+
    '<div class="m-teams">'+renderFlags(p.teams)+' '+esc(p.pair)+'</div>'+
    '<div class="m-total">'+p.total+'</div>'+
    '<div class="m-sub">TOTAL POINTS · Group Stage + Round of 32</div>'+
    '<div class="m-breakdown">'+
    '<div class="m-row"><span class="m-label">Chit #</span><span class="m-val">'+p.chit+'</span></div>'+
    '<div class="m-row"><span class="m-label">Team 1 (GS)</span><span class="m-val">'+p.t1_gs+' pts</span></div>'+
    '<div class="m-row"><span class="m-label">Team 2 (GS)</span><span class="m-val">'+p.t2_gs+' pts</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(p.teams[0])+' (R32)</span><span class="m-val'+(p.t1_r32?' adv':'')+'">'+(p.t1_r32!==null?p.t1_r32+' pts':'—')+'</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(p.teams[1])+' (R32)</span><span class="m-val'+(p.t2_r32?' adv':'')+'">'+(p.t2_r32!==null?p.t2_r32+' pts':'—')+'</span></div>'+
    '</div>';
  document.getElementById('modal').classList.add('active');
}

document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
});
function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

/* ─── SCROLL ANIM ─── */
function initFadeIns(){
  setTimeout(function(){
    var els=document.querySelectorAll('.fade-in');
    if(!els.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('visible');
          obs.unobserve(entry.target);
        }
      });
    },{threshold:0.1});
    els.forEach(function(el){obs.observe(el)});
  },100);
}

/* ─── GO ─── */
loadData();
