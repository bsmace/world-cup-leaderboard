<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Office Pool — Live Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}

:root{
  --bg:#060B18;--bg-card:rgba(255,255,255,.02);--bg-elevated:#0E1A30;
  --gold:#FDB824;--gold-dim:rgba(253,184,36,.12);
  --silver:#C8D4E0;--silver-dim:rgba(200,212,224,.1);
  --bronze:#E0935A;--bronze-dim:rgba(224,147,90,.1);
  --text:#FFF;--text2:#B0C0D0;--text3:#7188A8;--text4:#4A5A70;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.09);
  --hover:rgba(255,255,255,.04);
  --go-bg:rgba(42,157,143,.12);--go:#2A9D8F;
  --no-bg:rgba(74,90,112,.15);--no:#4A5A70;
  --r-sm:12px;--r-md:18px;--r-lg:24px;
}

body{
  background:var(--bg);color:var(--text);
  font-family:Inter,system-ui,-apple-system,sans-serif;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(900px 350px at 50% -80px, rgba(255,255,255,.03), transparent 60%);
}
.wrap{max-width:1040px;margin:0 auto;padding:40px 20px 50px;position:relative;z-index:1}

/* ─── HEADER ─── */
.header{text-align:center;margin-bottom:36px}
.h-top{font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--text3);text-transform:uppercase}
.h-mid{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(32px,6vw,56px);color:var(--text);line-height:.95;text-transform:uppercase;letter-spacing:.02em;margin-top:2px}
.h-bar{width:36px;height:3px;background:var(--text3);margin:10px auto;border-radius:99px;opacity:.5}
.h-info{font-size:12px;color:var(--text3);margin-top:2px}
.h-info b{color:var(--text2);font-weight:600}
.h-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--go);margin-right:5px;vertical-align:middle}

/* ─── SEARCH + FILTERS ─── */
.sf{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.srch{position:relative;flex:1;max-width:300px;min-width:200px}
.srch input{
  width:100%;padding:10px 14px 10px 38px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--bg-card);color:var(--text);
  font-size:13px;font-family:inherit;outline:none;transition:border .25s;
}
.srch input:focus-visible{border-color:var(--text2)}
.srch input::placeholder{color:var(--text3)}
.srch .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.fp{display:flex;gap:5px;flex-wrap:wrap}
.fp button{
  padding:6px 14px;border-radius:999px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text3);font-size:12px;
  font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.fp button:hover{background:var(--hover);color:var(--text2);border-color:var(--border2)}
.fp button:focus-visible{outline:2px solid rgba(255,255,255,.25);outline-offset:2px}
.fp button.a{background:var(--text2);color:var(--bg);border-color:var(--text2)}
#scnt{text-align:center;font-size:11px;color:var(--text3);margin-top:2px;min-height:17px;width:100%}

/* ─── WINNER CARDS ─── */
.pd{display:flex;justify-content:center;align-items:flex-end;gap:12px;margin-bottom:36px}
.pd-c{
  border-radius:var(--r-lg);overflow:hidden;text-align:center;
  flex:1;cursor:pointer;position:relative;
  transition:transform .25s,box-shadow .25s;
}
.pd-c:hover{transform:translateY(-3px)}
.pd-1{flex:1.35;background:linear-gradient(180deg,rgba(253,184,36,.04),transparent);border:1px solid rgba(253,184,36,.18);box-shadow:0 8px 40px rgba(253,184,36,.06),inset 0 1px 0 rgba(253,184,36,.1)}
.pd-2{background:linear-gradient(180deg,rgba(200,212,224,.03),transparent);border:1px solid rgba(200,212,224,.1)}
.pd-3{background:linear-gradient(180deg,rgba(224,147,90,.03),transparent);border:1px solid rgba(224,147,90,.1)}

.pd-sp{
  margin:0;text-align:center;
}
.pd-1 .pd-sp{padding:24px 20px 18px}
.pd-2 .pd-sp,.pd-3 .pd-sp{padding:20px 16px 14px}
.pd-sm{font-size:36px;line-height:1;margin-bottom:2px}
.pd-1 .pd-sm{font-size:42px}
.pd-sl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.pd-1 .pd-sl{color:var(--gold)}
.pd-2 .pd-sl{color:var(--silver)}
.pd-3 .pd-sl{color:var(--bronze)}
.pd-sn{font-family:'Bebas Neue',sans-serif;line-height:1;margin-top:2px}
.pd-1 .pd-sn{font-size:clamp(42px,6vw,68px);background:linear-gradient(180deg,var(--gold),var(--text) 55%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.pd-2 .pd-sn{font-size:clamp(34px,4.5vw,52px);color:var(--silver)}
.pd-3 .pd-sn{font-size:clamp(34px,4.5vw,52px);color:var(--bronze)}
.pd-su{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

.pd-name{font-family:'Bebas Neue',sans-serif;color:var(--text);line-height:1;margin:0 0 10px}
.pd-1 .pd-name{font-size:clamp(24px,3.2vw,36px)}
.pd-2 .pd-name,.pd-3 .pd-name{font-size:clamp(20px,2.5vw,28px);margin-top:4px}

.pd-flags{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
.pd-f{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(0,0,0,.2);border-radius:var(--r-sm);padding:8px 12px 6px;
}
.pd-f img{display:block;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pd-1 .pd-f img{width:52px;height:39px}
.pd-2 .pd-f img,.pd-3 .pd-f img{width:44px;height:33px}
.pd-code{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em}
.pd-bdge{
  font-size:8px;font-weight:700;padding:1px 6px;border-radius:99px;
  text-transform:uppercase;line-height:1.3;
}
.pd-bdge.go{background:var(--go-bg);color:var(--go)}
.pd-bdge.no{background:var(--no-bg);color:var(--no)}

.pd-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:0 16px 18px}
.pd-1 .pd-stats{padding:0 20px 22px}
.pd-2 .pd-stats,.pd-3 .pd-stats{padding:0 16px 16px}
.pd-stats span{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.pd-stats b{font-weight:600}
.pd-1 .pd-stats b{color:var(--text2)}
.pd-2 .pd-stats b,.pd-3 .pd-stats b{color:var(--text2)}

.pd-j{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap;padding:0 10px 14px}
.pd-jt{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:6px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:background .2s;
}
.pd-jt:hover{background:var(--hover)}
.pd-jt img{width:18px;height:13px;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.pd-jn{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap}
.pd-jp{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--text2);margin-left:2px}

/* ─── TIER CARDS ─── */
.t-grid{display:grid;gap:12px;margin-bottom:36px}
.t-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);
  transition:transform .2s,box-shadow .2s;overflow:hidden;
  border-left:3px solid var(--border);
}
.t-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.25);border-color:var(--border2);border-left-color:var(--border2)}
.t-hd{display:flex;align-items:center;gap:8px;padding:14px 18px 0}
.t-hd .m{font-size:16px;line-height:1;opacity:.6}
.t-hd .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;color:var(--text2)}
.t-hd .tc{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;margin-left:auto;color:var(--text2)}
.t-body{padding:10px 14px 16px}
.t-row{display:grid;gap:8px}
.t-row.c2{grid-template-columns:1fr 1fr}

.ent{
  display:flex;align-items:center;gap:10px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;
  cursor:pointer;transition:background .2s,transform .15s,border-color .2s;min-width:0;
}
.ent:focus-visible{outline:2px solid rgba(255,255,255,.2);outline-offset:2px}
.ent:hover{background:var(--hover);transform:translateY(-1px);border-color:var(--border2)}
.ent .ef{display:flex;gap:5px;flex-shrink:0;align-items:center}
.ent .ef .ew{position:relative;display:inline-flex}
.ent .ef img{width:26px;height:19px;border-radius:2px;box-shadow:0 1px 4px rgba(0,0,0,.3);display:block}
.ent .eb{
  position:absolute;bottom:-3px;right:-3px;font-size:7px;line-height:1;
  background:var(--go);color:#fff;border-radius:50%;width:11px;height:11px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 3px rgba(0,0,0,.35);
}
.ent .ei{min-width:0;flex:1}
.ent .en{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent .ep{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ent .ea{display:flex;align-items:center;margin-top:2px}
.ent .ea .ab{
  font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;
  line-height:1.3;white-space:nowrap;
}
.ent .ea .ab.go{background:var(--go-bg);color:var(--go)}
.ent .ea .ab.no{background:var(--no-bg);color:var(--no)}
.ent .er{text-align:right;flex-shrink:0}
.ent .pt{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--text)}
.ent .pb{width:56px;height:3px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden;margin-top:2px;margin-left:auto}
.ent .pb .fl{height:100%;border-radius:99px;background:var(--text3);transition:width .8s}

/* ─── HM ─── */
.hm{margin-top:28px}
.hm-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.hm-hd h2{font-family:Inter,sans-serif;font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;color:var(--text3)}
.hm-hd .hl{height:1px;flex:1;background:var(--border)}
.sd{display:flex;align-items:center;gap:8px;margin:12px 0 7px}
.sd s{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text3);white-space:nowrap}
.sd .l{height:1px;flex:1;background:var(--border)}
.hm-cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
.hm-c{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .2s;
}
.hm-c:hover{background:var(--hover);transform:translateY(-1px);border-color:var(--border2)}
.hm-c:focus-visible{outline:2px solid rgba(255,255,255,.2);outline-offset:2px}
.hm-c img{width:22px;height:16px;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.25);display:block}
.hm-ci{flex:1;min-width:0}
.hm-cn{font-weight:600;font-size:12px}
.hm-ct{font-size:9px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-cp{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2);line-height:1;flex-shrink:0;text-align:right}
.hm-cp small{font-size:7px;color:var(--text4);display:block}

/* ─── MODAL ─── */
.mo{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;padding:16px;
}
.mo.a{opacity:1;pointer-events:all}
.m{
  background:linear-gradient(170deg,#0C1628,#080C18);
  border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:32px 28px;max-width:400px;width:100%;
  position:relative;box-shadow:0 50px 100px rgba(0,0,0,.5);
  transform:translateY(24px) scale(.97);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
  max-height:90vh;overflow-y:auto;
}
.mo.a .m{transform:translateY(0) scale(1)}
.mx{
  position:absolute;top:12px;right:14px;background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;padding:4px 8px;
  border-radius:8px;transition:all .2s;font-family:inherit;line-height:1;z-index:2;
}
.mx:focus-visible{outline:2px solid rgba(255,255,255,.25);outline-offset:2px}
.mx:hover{background:rgba(255,255,255,.06);color:var(--text)}
.mm{text-align:center}
.m-medal{font-size:32px;line-height:1;margin-bottom:2px}
.m-rank{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em}
.m-rank.gold{color:var(--gold)}
.m-rank.silver{color:var(--silver)}
.m-rank.bronze{color:var(--bronze)}
.m-name{font-size:20px;font-weight:700;margin-top:4px}
.m-flags{display:flex;justify-content:center;gap:14px;margin:12px 0}
.m-f{display:flex;flex-direction:column;align-items:center;gap:4px}
.m-f img{width:40px;height:30px;border-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,.3);display:block}
.m-code{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em}
.m-bdge{font-size:8px;font-weight:700;padding:1px 7px;border-radius:99px;text-transform:uppercase}
.m-bdge.go{background:var(--go-bg);color:var(--go)}
.m-bdge.no{background:var(--no-bg);color:var(--no)}
.m-score{
  font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;
  color:var(--text);margin:10px 0 2px;
}
.m-lbl{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.m-bd{margin-top:16px;text-align:left}
.m-sec{
  font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  padding:8px 0 4px;border-bottom:1px solid var(--border);
}
.m-sec:first-child{padding-top:0}
.m-r2{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:12px;border-bottom:1px solid var(--border);
}
.m-r2:last-of-type{border-bottom:none}
.m-r2 .ml{color:var(--text3)}
.m-r2 .mv{font-weight:600;display:flex;align-items:center;gap:4px;color:var(--text2)}
.m-r2 .mv.go{color:var(--go)}
.m-r2 .mv.no{color:var(--text4)}
.m-bar{
  width:60px;height:3px;border-radius:99px;
  background:rgba(255,255,255,.05);overflow:hidden;
}
.m-bar .fl{height:100%;border-radius:99px;background:var(--text4);transition:width .8s cubic-bezier(.16,1,.3,1)}
.m-chit{
  display:flex;justify-content:space-between;align-items:center;padding:8px 0 0;font-size:11px;
}
.m-chit .ml{color:var(--text3)}
.m-chit .mv{font-weight:600;color:var(--text2)}

/* ─── MOUSE SPOTLIGHT ─── */
#glow{
  position:fixed;left:0;top:0;width:400px;height:400px;border-radius:50%;
  pointer-events:none;z-index:0;
  transform:translate(-200px,-200px);
  transition:transform .8s cubic-bezier(.16,1,.3,1);
  background:radial-gradient(circle,rgba(255,255,255,.035) 0%,transparent 65%);
}
@media(max-width:768px){#glow{display:none}}

/* ─── FOOTER ─── */
.ft{text-align:center;margin-top:48px;color:var(--text3);font-size:11px;line-height:1.6;padding-top:20px;border-top:1px solid var(--border)}
.ft b{color:var(--text2);font-weight:600}

/* ─── ANIMATIONS ─── */
@media(prefers-reduced-motion:no-preference){
  .fi{opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease}
  .fi.v{opacity:1;transform:translateY(0)}
}
@media(prefers-reduced-motion:reduce){
  .fi{opacity:1;transform:none}
  .fi.v{opacity:1;transform:none}
  .ent:hover,.pd-c:hover,.t-card:hover,.hm-c:hover{transform:none}
  .pd-c:hover{transform:none}
  .m-score{transition:none}
}

/* ─── EMPTY ─── */
.emp{text-align:center;padding:50px 20px;color:var(--text3)}
.emp .ei{font-size:36px;margin-bottom:8px;display:block;opacity:.4}
.emp p{font-size:13px}

/* ─── RWD ─── */
@media(max-width:799px){
  .pd{flex-direction:column;align-items:stretch;gap:10px}
  .pd-1{order:-1;flex:1}
  .pd-1 .pd-f img{width:44px;height:33px}
  .pd-2 .pd-f img,.pd-3 .pd-f img{width:40px;height:30px}
  .pd-1 .pd-sn{font-size:48px}
  .pd-2 .pd-sn,.pd-3 .pd-sn{font-size:38px}
  .pd-c{border-radius:var(--r-md)}
  .pd-1 .pd-sp{padding:20px 16px 14px}
  .pd-2 .pd-sp,.pd-3 .pd-sp{padding:16px 12px 12px}
  .pd-stats{flex-wrap:wrap}
}
@media(min-width:500px){
  .t-row.c2{grid-template-columns:1fr 1fr}
}
@media(max-width:499px){
  .t-row.c2{grid-template-columns:1fr}
  .hm-cg{grid-template-columns:1fr}
  .m{padding:24px 16px;border-radius:var(--r-md)}
  .wrap{padding:24px 12px 36px}
  .sf{flex-direction:column}
  .srch{max-width:100%}
  .pd-c{padding:0}
  .pd-flags{gap:8px}
  .pd-f{padding:6px 10px 5px}
  .t-hd{padding:12px 14px 0}
  .t-body{padding:8px 10px 12px}
  .ent{padding:7px 10px}
  .ent .ef img{width:22px;height:16px}
}
</style>
</head>
<body>
<div id="glow"></div>
<div class="wrap">
  <header class="header">
    <div class="h-top">FIFA World Cup 2026&trade;</div>
    <div class="h-mid">Office Pool</div>
    <h1>Live Leaderboard</h1>
    <div class="h-bar" aria-hidden="true"></div>
    <p class="h-info"><span class="h-dot"></span>Round of 32 Complete &middot; <b id="pc">—</b> participants</p>
  </header>
  <div class="sf" role="search">
    <div class="srch">
      <span class="ico" aria-hidden="true">&#x1F50D;</span>
      <input type="text" id="s" placeholder="Search name or nation..." autocomplete="off" aria-label="Search players">
    </div>
    <div class="fp" role="group" aria-label="Filter players">
      <button data-f="all" class="a" aria-pressed="true">All</button>
      <button data-f="adv" aria-pressed="false">Advancers</button>
      <button data-f="noa" aria-pressed="false">Non-advancers</button>
    </div>
    <div id="scnt"></div>
  </div>
  <div id="app" role="main" aria-label="Leaderboard"></div>
  <footer class="ft">
    <b id="fc">—</b> &middot; Two nations per player &middot; GS + R32 points<br>
    FIFA World Cup 2026 Office Pool
  </footer>
</div>
<div class="mo" id="mo" role="dialog" aria-modal="true" aria-label="Player details">
  <div class="m" id="md">
    <button class="mx" id="mx" aria-label="Close modal">&times;</button>
    <div id="mb"></div>
  </div>
</div>

<script>
var CC={
  France:'fr',Mexico:'mx',Argentina:'ar',Switzerland:'ch',
  England:'gb-eng',Scotland:'gb-sct',Colombia:'co',Norway:'no',
  'Ivory Coast':'ci',Spain:'es',Morocco:'ma',Sweden:'se',
  Bosnia:'ba',Australia:'au','Congo DR':'cd','South Africa':'za',
  Ecuador:'ec',Germany:'de',USA:'us',Brazil:'br',Japan:'jp',
  Netherlands:'nl',Egypt:'eg',Portugal:'pt',Canada:'ca',
  Austria:'at',Algeria:'dz',Croatia:'hr',Paraguay:'py',
  Curaçao:'cw',Czechia:'cz','Cabo Verde':'cv',Iran:'ir',
  'Türkiye':'tr',Turkiye:'tr',Senegal:'sn',Uzbekistan:'uz',
  Panama:'pa',Uruguay:'uy',Belgium:'be',Ghana:'gh',Qatar:'qa',
  'New Zealand':'nz','Korea Republic':'kr','Saudi Arabia':'sa',
  Haiti:'ht',Jordan:'jo',Tunisia:'tn',Iraq:'iq'
};
var FC={
  France:'FRA',Mexico:'MEX',Argentina:'ARG',Switzerland:'SUI',
  England:'ENG',Scotland:'SCO',Colombia:'COL',Norway:'NOR',
  'Ivory Coast':'CIV',Spain:'ESP',Morocco:'MAR',Sweden:'SWE',
  Bosnia:'BIH',Australia:'AUS','Congo DR':'COD','South Africa':'RSA',
  Ecuador:'ECU',Germany:'GER',USA:'USA',Brazil:'BRA',Japan:'JPN',
  Netherlands:'NED',Egypt:'EGY',Portugal:'POR',Canada:'CAN',
  Austria:'AUT',Algeria:'ALG',Croatia:'CRO',Paraguay:'PAR',
  Curaçao:'CUW',Czechia:'CZE','Cabo Verde':'CPV',Iran:'IRN',
  'Türkiye':'TUR',Turkiye:'TUR',Senegal:'SEN',Uzbekistan:'UZB',
  Panama:'PAN',Uruguay:'URU',Belgium:'BEL',Ghana:'GHA',Qatar:'QAT',
  'New Zealand':'NZL','Korea Republic':'KOR','Saudi Arabia':'KSA',
  Haiti:'HAI',Jordan:'JOR',Tunisia:'TUN',Iraq:'IRQ'
};

function fe(n,w){
  var c=CC[n];if(!c)return'';
  var h=Math.round(w*3/4);
  return '<img src="https://flagcdn.com/'+c+'.png" alt="'+es(n)+'" loading="lazy" width="'+w+'" height="'+h+'">';
}

function es(s){
  return String(s).replace(/[&<>"']/g,function(m){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m
  });
}

var pl=[],_f='all',_q='';

function ld(){
  fetch('data.json?'+Date.now()).then(function(r){return r.json()}).then(function(d){
    pl=d.players;
    document.getElementById('pc').textContent=d.totalPlayers;
    document.getElementById('fc').textContent=d.totalPlayers+' participants';
    document.getElementById('s').addEventListener('input',function(){_q=this.value;f()});
    document.querySelectorAll('.fp button').forEach(function(b){
      b.addEventListener('click',function(){
        document.querySelectorAll('.fp button').forEach(function(x){x.classList.remove('a');x.setAttribute('aria-pressed','false')});
        this.classList.add('a');this.setAttribute('aria-pressed','true');
        _f=this.getAttribute('data-f');f();
      });
    });
    f();
  }).catch(function(){
    document.getElementById('app').innerHTML='<div class="emp"><span class="ei">&#x26A0;&#xFE0F;</span><p>Could not load data.</p></div>';
  });
}

function f(){
  var fl=pl;
  if(_q.trim()){
    var q=_q.toLowerCase().trim();
    fl=fl.filter(function(p){
      return p.name.toLowerCase().includes(q)||p.pair.toLowerCase().includes(q)||
        p.teams.some(function(t){return t.toLowerCase().includes(q)});
    });
  }
  if(_f==='adv')fl=fl.filter(function(p){return p.t1_r32||p.t2_r32});
  if(_f==='noa')fl=fl.filter(function(p){return !p.t1_r32&&!p.t2_r32});
  document.getElementById('scnt').textContent=fl.length!==pl.length?'Showing '+fl.length+' of '+pl.length+' players':'';
  if(!fl.length){
    document.getElementById('app').innerHTML='<div class="emp"><span class="ei">&#x1F50D;</span><p>No players match your search.</p></div>';
    return;
  }
  var g=gb(fl);
  document.getElementById('app').innerHTML=rP(g)+rT(g)+rHM(g);
  setTimeout(sa,30);
}

function gb(a){
  var m={};
  a.forEach(function(p){if(!m[p.total])m[p.total]=[];m[p.total].push(p)});
  return Object.keys(m).map(Number).sort(function(a,b){return b-a}).map(function(k){return{score:k,players:m[k]}});
}

function fg(g,s){for(var i=0;i<g.length;i++){if(g[i].score===s)return g[i]}return null}

/* ─── RENDER WINNER CARDS ─── */
function rP(g){
  var g1=fg(g,24),g2=fg(g,22),g3=fg(g,21);
  if(!g1)return'';
  var p1=g1.players[0];
  var p2=g2?g2.players:null,p3=g3?g3.players[0]:null;
  return '<div class="fi pd">'+
    (p2?rPC(p2,'2'):'')+
    rPC([p1],'1')+
    (p3?rPC([p3],'3'):'')+
    '</div>';
}

function rPC(ps,r){
  var p=ps[0],is1=r==='1',t=p.teams;
  var medal=r==='1'?'&#x1F947;':r==='2'?'&#x1F948;':'&#x1F949;';
  var label=r==='1'?'CHAMPION':r==='2'?'RUNNERS-UP':'3RD PLACE';
  var cls='pd-c pd-'+r+(is1?' fi':'');
  var h='<div class="'+cls+'" onclick="oM('+p.chit+')">'+
    '<div class="pd-sp">'+
    '<div class="pd-sm">'+medal+'</div>'+
    '<div class="pd-sl">'+label+'</div>'+
    '<div class="pd-sn">'+p.total+'</div>'+
    '<div class="pd-su">POINTS</div>'+
    '</div>'+
    '<div class="pd-name">'+es(p.name)+'</div>'+
    '<div class="pd-flags">';
  ps.forEach(function(pu){
    h+='<div class="pd-f">'+
      fe(pu.teams[0].trim(),is1?52:44)+
      '<span class="pd-code">'+FC[pu.teams[0].trim()]+'</span>'+
      '<span class="pd-bdge '+(pu.t1_r32?'go':'no')+'">'+(pu.t1_r32?'R32':'GS')+'</span>'+
      '</div><div class="pd-f">'+
      fe(pu.teams[1].trim(),is1?52:44)+
      '<span class="pd-code">'+FC[pu.teams[1].trim()]+'</span>'+
      '<span class="pd-bdge '+(pu.t2_r32?'go':'no')+'">'+(pu.t2_r32?'R32':'GS')+'</span>'+
      '</div>';
  });
  h+='</div>'+
    '<div class="pd-stats">'+
    '<span>GS <b>'+(p.t1_gs+p.t2_gs)+'</b></span>'+
    '<span>R32 <b>'+((p.t1_r32||0)+(p.t2_r32||0))+'</b></span>'+
    '<span>Chit #<b>'+p.chit+'</b></span>'+
    '</div>';
  if(ps.length>1){
    h+='<div class="pd-j">';
    for(var i=1;i<ps.length;i++){
      h+='<div class="pd-jt" onclick="event.stopPropagation();oM('+ps[i].chit+')">'+
        fe(ps[i].teams[0].trim(),18)+fe(ps[i].teams[1].trim(),18)+
        '<span class="pd-jn">'+es(ps[i].name)+'</span>'+
        '<span class="pd-jp">'+ps[i].total+'</span></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

/* ─── RENDER TIERS ─── */
function rT(g){
  var ts=[
    {l:'4th Place',s:20,c:'4'},
    {l:'5th Place',s:19,c:'5'},
    {l:'Joint 6th Place',s:18,c:'6'}
  ];
  var h='';
  ts.forEach(function(t){
    var gr=fg(g,t.s);
    if(!gr)return;
    h+='<div class="fi t-card t-'+t.c+'"><div class="t-hd">'+
      '<span class="m">&#x1F3C5;</span><span class="l">'+t.l+'</span><span class="tc">'+t.s+'</span></div>'+
      '<div class="t-body"><div class="t-row c2">';
    gr.players.forEach(function(p){
      h+='<div class="ent" onclick="oM('+p.chit+')">'+
        '<div class="ef">'+
        '<span class="ew">'+fe(p.teams[0].trim(),26)+(p.t1_r32?'<span class="eb">&#x2713;</span>':'')+'</span>'+
        '<span class="ew">'+fe(p.teams[1].trim(),26)+(p.t2_r32?'<span class="eb">&#x2713;</span>':'')+'</span>'+
        '</div>'+
        '<div class="ei"><div class="en">'+es(p.name)+'</div><div class="ep">'+es(p.pair)+'</div><div class="ea"><span class="ab '+(p.t1_r32||p.t2_r32?'go':'no')+'">'+((p.t1_r32?1:0)+(p.t2_r32?1:0))+'/2 R32</span></div></div>'+
        '<div class="er"><div class="pt">'+p.total+'</div><div class="pb"><div class="fl" style="width:'+Math.round(p.total/24*100)+'%"></div></div></div>'+
        '</div>';
    });
    h+='</div></div></div>';
  });
  if(h)h='<div class="t-grid">'+h+'</div>';
  return h;
}

/* ─── RENDER HM ─── */
function rHM(g){
  var h='<div class="fi hm"><div class="hm-hd"><h2>Honorable Mentions</h2><div class="hl"></div></div>';
  var any=false;
  g.forEach(function(gr){
    if(gr.score>=18)return;
    any=true;
    h+='<div class="sd"><s>'+gr.score+' PTS</s><div class="l"></div></div><div class="hm-cg">';
    gr.players.forEach(function(p){
      h+='<div class="hm-c" onclick="oM('+p.chit+')">'+
        fe(p.teams[0].trim(),22)+fe(p.teams[1].trim(),22)+
        '<div class="hm-ci"><div class="hm-cn">'+es(p.name)+'</div><div class="hm-ct">'+es(p.pair)+'</div></div>'+
        '<div class="hm-cp">'+gr.score+'<small>PTS</small></div></div>';
    });
    h+='</div>';
  });
  if(!any){h+='<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">No players below this tier.</div>'}
  h+='</div>';
  return h;
}

/* ─── MODAL ─── */
function oM(chit){
  var p=pl.find(function(p){return p.chit===chit});
  if(!p)return;
  var r=p.rank,ord=['th','st','nd','rd'],sx=ord[(r%10>3||Math.floor(r/10)%10===1)?0:r%10]||'th',t=p.teams;
  var medal=r===1?'&#x1F947;':r===2?'&#x1F948;':'&#x1F949;';
  var rk=r===1?'gold':r===2?'silver':'bronze';
  var rn=r===1?'GOLD':r===2?'SILVER':'BRONZE';
  document.getElementById('mb').innerHTML=
    '<div class="mm">'+
    '<div class="m-medal">'+medal+'</div>'+
    '<div class="m-rank '+rk+'">#'+r+sx+' PLACE &middot; '+rn+'</div>'+
    '<div class="m-name">'+es(p.name)+'</div>'+
    '<div class="m-flags">'+
    '<div class="m-f">'+fe(t[0].trim(),40)+'<span class="m-code">'+FC[t[0].trim()]+'</span><span class="m-bdge '+(p.t1_r32?'go':'no')+'">'+(p.t1_r32?'R32':'GS')+'</span></div>'+
    '<div class="m-f">'+fe(t[1].trim(),40)+'<span class="m-code">'+FC[t[1].trim()]+'</span><span class="m-bdge '+(p.t2_r32?'go':'no')+'">'+(p.t2_r32?'R32':'GS')+'</span></div>'+
    '</div>'+
    '<div class="m-score" data-cu="'+p.total+'">0</div>'+
    '<div class="m-lbl">POINTS</div>'+
    '</div>'+
    '<div class="m-bd">'+
    '<div class="m-sec">Group Stage</div>'+
    '<div class="m-r2"><span class="ml">'+es(t[0].trim())+'</span><span class="mv">'+p.t1_gs+' <span class="m-bar"><span class="fl" style="width:'+Math.round(p.t1_gs/9*100)+'%"></span></span></span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[1].trim())+'</span><span class="mv">'+p.t2_gs+' <span class="m-bar"><span class="fl" style="width:'+Math.round(p.t2_gs/9*100)+'%"></span></span></span></div>'+
    '<div class="m-sec">Round of 32</div>'+
    '<div class="m-r2"><span class="ml">'+es(t[0].trim())+'</span><span class="mv '+(p.t1_r32?'go':'no')+'">'+(p.t1_r32!==null?p.t1_r32+' <span class="m-bar"><span class="fl" style="width:'+Math.round((p.t1_r32||0)/3*100)+'%"></span></span>':'Did not advance')+'</span></div>'+
    '<div class="m-r2"><span class="ml">'+es(t[1].trim())+'</span><span class="mv '+(p.t2_r32?'go':'no')+'">'+(p.t2_r32!==null?p.t2_r32+' <span class="m-bar"><span class="fl" style="width:'+Math.round((p.t2_r32||0)/3*100)+'%"></span></span>':'Did not advance')+'</span></div>'+
    '<div class="m-chit"><span class="ml">Chit #</span><span class="mv">'+p.chit+'</span></div>'+
    '</div>';
  document.getElementById('mo').classList.add('a');
  document.getElementById('mx').focus();
  setTimeout(function(){
    var el=document.querySelector('.m-score[data-cu]');
    if(el)cu(el,parseInt(el.getAttribute('data-cu')));
  },120);
}

function cu(el,t){
  var c=0;
  if(!t||t<0)return;
  var d=Math.max(16,Math.floor(400/t));
  function st(){
    if(c<t){c++;el.textContent=c;setTimeout(st,d)}
    else el.textContent=t;
  }
  st();
}

document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)cM()});
document.getElementById('mx').addEventListener('click',cM);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')cM();
  if(e.key==='Tab'&&document.getElementById('mo').classList.contains('a')){
    var f=document.querySelectorAll('#md button,#md input,#md a');
    if(!f.length)return;
    var fi=Array.prototype.indexOf.call(f,document.activeElement);
    if(e.shiftKey&&fi===0){e.preventDefault();f[f.length-1].focus()}
    else if(!e.shiftKey&&fi===f.length-1){e.preventDefault();f[0].focus()}
  }
});
function cM(){document.getElementById('mo').classList.remove('a')}

/* ─── STAGGER ─── */
function sa(){
  var els=document.querySelectorAll('.fi');
  Array.prototype.forEach.call(els,function(el,i){
    new IntersectionObserver(function(e){
      if(e[0].isIntersecting){
        el.style.transitionDelay=((i%8)*50)+'ms';
        el.classList.add('v');
        this.unobserve(el);
      }
    },{threshold:.05}).observe(el);
  });
}

/* ─── MOUSE SPOTLIGHT ─── */
(function(){
  var el=document.getElementById('glow');
  if(!el)return;
  if('ontouchstart'in window||navigator.maxTouchPoints>0){el.style.display='none';return}
  var raf=null;
  document.addEventListener('mousemove',function(e){
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(function(){
      el.style.transform='translate('+(e.clientX-200)+'px,'+(e.clientY-200)+'px)';
      raf=null;
    });
  });
})();

ld();
</script>
