<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA 2026 Office Pool — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
:root{
  --gold:#FDB824;--gold-dk:#D49A10;--gold-glow:rgba(253,184,36,.3);
  --teal:#00929F;--teal-dk:#00707A;--teal-glow:rgba(0,146,159,.25);
  --bg1:#060B18;--bg2:#0A1228;--bg3:#0F1A30;
  --card:rgba(255,255,255,.04);--card-border:rgba(255,255,255,.08);
  --card-hover:rgba(255,255,255,.07);
  --ink:#FFFFFF;--muted:#7A8FAC;
  --r:16px;--rs:12px;
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--ink);
  background:var(--bg1);min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1100px 500px at 50% -180px, rgba(253,184,36,.07), transparent 65%),
    radial-gradient(600px 500px at 5% 15%, rgba(0,146,159,.04), transparent 50%),
    radial-gradient(600px 500px at 95% 15%, rgba(253,184,36,.03), transparent 50%),
    radial-gradient(1000px 600px at 50% 85%, rgba(0,146,159,.025), transparent 50%);
}
.wrap{max-width:1100px;margin:0 auto;padding:40px 20px 60px;position:relative;z-index:1}

/* ─── HEADER ─── */
.header{text-align:center;margin-bottom:48px}
.kicker{
  display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--bg1);
  background:linear-gradient(135deg,var(--gold),var(--gold-dk));
  padding:6px 16px;border-radius:999px;margin-bottom:18px;box-shadow:0 4px 20px rgba(253,184,36,.15);
}
h1{
  font-family:'Bebas Neue',sans-serif;font-weight:400;line-height:.88;
  font-size:clamp(52px,11vw,120px);text-transform:uppercase;
  background:linear-gradient(180deg,#fff 15%,var(--gold) 75%,var(--gold-dk) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 24px var(--gold-glow));
  letter-spacing:-.02em;
}
.sub{
  margin-top:10px;color:var(--muted);font-size:clamp(13px,1.8vw,15px);
  max-width:600px;margin-inline:auto;line-height:1.55;
}
.sub b{color:#fff}
.pulse-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--teal);margin-right:5px;vertical-align:middle;
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* ─── SEARCH ─── */
.search-wrap{max-width:400px;margin:0 auto 36px;position:relative}
.search-wrap input{
  width:100%;padding:13px 16px 13px 42px;border-radius:var(--r);
  border:1px solid var(--card-border);background:var(--card);color:#fff;
  font-size:14px;font-family:inherit;outline:none;
  backdrop-filter:blur(12px);transition:border .25s,box-shadow .25s;
}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(253,184,36,.1)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
#search-count{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;min-height:18px}

/* ─── CHAMPION ─── */
.champion-wrap{position:relative;margin-bottom:28px}
.champion{
  background:linear-gradient(135deg,rgba(253,184,36,.1),rgba(253,184,36,.03),rgba(0,146,159,.04));
  border:1px solid rgba(253,184,36,.2);border-radius:24px;padding:36px 28px;
  backdrop-filter:blur(16px);box-shadow:0 0 60px rgba(253,184,36,.08),inset 0 1px 0 rgba(253,184,36,.15);
  position:relative;overflow:hidden;text-align:center;
}
.champion::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(500px 250px at 50% -40px, rgba(253,184,36,.12), transparent 60%);
  pointer-events:none;
}
.crown-wrap{
  display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;
}
.crown-wrap .crown{font-size:44px;animation:float 3s ease-in-out infinite}
.crown-wrap .trophy{font-size:36px;opacity:.6}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.champ-badge{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--bg1);background:var(--gold);padding:3px 14px;border-radius:999px;margin-bottom:10px;
}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,6vw,60px);color:#fff;line-height:1}
.flag-group{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0 10px}
.flag-badge{
  display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);
  border:1px solid var(--card-border);border-radius:999px;padding:6px 16px 6px 10px;
}
.flag-badge .flag{font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.flag-badge .fn{font-size:13px;font-weight:500;color:var(--muted)}
.champ-score{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,7vw,68px);line-height:1;
  background:linear-gradient(180deg,var(--gold),#fff 55%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-top:4px;
}
.champ-sub{font-size:12px;color:var(--muted);letter-spacing:.08em;margin-top:1px}
.champ-breakdown{display:flex;justify-content:center;gap:20px;margin-top:12px;flex-wrap:wrap}
.champ-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.champ-stat b{color:#fff;font-weight:600}
.champ-stat .dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;
}
.dot-gold{background:var(--gold)}.dot-teal{background:var(--teal)}

/* ─── TIER CARDS ─── */
.tier-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:36px}
.tier-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:var(--r);
  padding:18px 20px;backdrop-filter:blur(10px);display:flex;align-items:flex-start;gap:16px;
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
  cursor:default;
}
.tier-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.tier-rank-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:52px;flex-shrink:0}
.tier-rank-col .tier-medal{font-size:28px;line-height:1}
.tier-rank-col .tier-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.tier-rank-col .tier-score{
  font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;margin-top:2px;
}
.tier-content{flex:1;min-width:0}
.tier-players{display:grid;gap:8px}
.tier-players.single{grid-template-columns:1fr}
.tier-players.double{grid-template-columns:1fr 1fr}
.tier-players.triple{grid-template-columns:1fr 1fr 1fr}

.tier-p-card{
  display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);border-radius:var(--rs);padding:10px 14px;
  transition:background .2s;cursor:pointer;min-width:0;
}
.tier-p-card:hover{background:var(--card-hover)}
.tier-p-card .p-card-flags{display:flex;gap:4px;flex-shrink:0}
.tier-p-card .p-card-flags .flag{font-size:24px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.tier-p-card .p-card-info{min-width:0}
.tier-p-card .p-card-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tier-p-card .p-card-teams{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tier-p-card .p-card-pts{
  font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;margin-left:auto;flex-shrink:0;
}

/* tier accents */
.tier-gold .tier-rank-col .tier-label{color:var(--gold)}
.tier-gold .tier-rank-col .tier-score{color:var(--gold)}
.tier-gold .tier-p-card .p-card-pts{color:var(--gold)}
.tier-gold{border-color:rgba(253,184,36,.15);background:linear-gradient(135deg,rgba(253,184,36,.06),rgba(253,184,36,.02))}

.tier-silver .tier-rank-col .tier-label{color:#D2DBE6}
.tier-silver .tier-rank-col .tier-score{color:#D2DBE6}
.tier-silver .tier-p-card .p-card-pts{color:#D2DBE6}
.tier-silver{border-color:rgba(210,219,230,.12)}

.tier-bronze .tier-rank-col .tier-label{color:#E0935A}
.tier-bronze .tier-rank-col .tier-score{color:#E0935A}
.tier-bronze .tier-p-card .p-card-pts{color:#E0935A}
.tier-bronze{border-color:rgba(224,147,90,.12)}

.tier-teal .tier-rank-col .tier-label{color:var(--teal)}
.tier-teal .tier-rank-col .tier-score{color:var(--teal)}
.tier-teal .tier-p-card .p-card-pts{color:var(--teal)}
.tier-teal{border-color:rgba(0,146,159,.12);background:linear-gradient(135deg,rgba(0,146,159,.05),rgba(0,146,159,.02))}

/* ─── HONORABLE MENTIONS ─── */
.hm-section{margin-top:28px}
.hm-header{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.hm-header h2{
  font-family:'Bebas Neue',sans-serif;font-weight:400;
  font-size:28px;letter-spacing:.04em;white-space:nowrap;
}
.hm-header .hm-line{height:1px;flex:1;background:linear-gradient(90deg,var(--card-border),transparent)}
.hm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.hm-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:var(--rs);
  padding:12px 14px;backdrop-filter:blur(8px);cursor:pointer;
  display:flex;align-items:center;gap:12px;transition:all .2s;
}
.hm-card:hover{background:var(--card-hover);transform:translateY(-1px)}
.hm-card .hm-flags{display:flex;gap:3px;flex-shrink:0}
.hm-card .hm-flags .flag{font-size:22px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.hm-card .hm-info{flex:1;min-width:0}
.hm-card .hm-name{font-weight:600;font-size:13px}
.hm-card .hm-teams{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-card .hm-pts{
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--teal);
  line-height:1;flex-shrink:0;text-align:right;
}
.hm-card .hm-pts small{font-size:9px;color:var(--muted);display:block}
.score-divider{
  display:flex;align-items:center;gap:10px;margin:16px 0 10px;
}
.score-divider span{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  color:var(--muted);white-space:nowrap;
}
.score-divider .sd-line{height:1px;flex:1;background:var(--card-border)}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:linear-gradient(145deg,#0C1428,#080C18);border:1px solid var(--card-border);
  border-radius:24px;padding:36px 32px;max-width:420px;width:100%;
  position:relative;box-shadow:0 40px 80px rgba(0,0,0,.5);
  transform:translateY(20px) scale(.97);transition:transform .35s cubic-bezier(.16,1,.3,1);
}
.modal-overlay.active .modal{transform:translateY(0) scale(1)}
.modal-close{
  position:absolute;top:14px;right:18px;background:none;border:none;
  color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;
  border-radius:8px;transition:all .2s;font-family:inherit;line-height:1;
}
.modal-close:hover{background:rgba(255,255,255,.08);color:#fff}
.modal .m-rank{
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:.06em;
}
.modal .m-name{font-size:22px;font-weight:700;margin-top:4px}
.modal .m-flag-group{display:flex;gap:12px;margin-top:10px}
.modal .m-flag-badge{
  display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);
  border:1px solid var(--card-border);border-radius:999px;padding:5px 14px 5px 8px;
}
.modal .m-flag-badge .flag{font-size:30px;line-height:1}
.modal .m-flag-badge .fn{font-size:12px;color:var(--muted);font-weight:500}
.modal .m-total{
  font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;
  background:linear-gradient(180deg,var(--gold),#fff 55%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin:14px 0 2px;
}
.modal .m-sub{font-size:11px;color:var(--muted);letter-spacing:.08em}
.modal .m-breakdown{margin-top:14px}
.modal .m-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;
}
.modal .m-row:last-child{border:none}
.modal .m-row .m-label{color:var(--muted)}
.modal .m-row .m-val{font-weight:600}
.modal .m-row .m-val.adv{color:var(--teal);display:flex;align-items:center;gap:4px}
.modal .m-row .m-val.adv::after{content:'✓';font-size:11px}
.modal .m-row .m-val.miss{color:#5A6A80}

/* ─── CONFETTI ─── */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.confetti i{position:absolute;top:-10px;border-radius:2px;opacity:.75;animation:cFal linear infinite}
@keyframes cFal{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(110vh) rotate(600deg)}}

/* ─── FOOTER ─── */
footer{text-align:center;margin-top:44px;color:var(--muted);font-size:12px;line-height:1.7;padding-top:24px;border-top:1px solid var(--card-border)}
footer b{color:#fff}

/* ─── ANIMATIONS ─── */
.fade-in{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* ─── RESPONSIVE ─── */
@media(min-width:700px){
  .tier-players.triple{grid-template-columns:1fr 1fr 1fr}
}
@media(min-width:500px)and(max-width:699px){
  .tier-players.double,.tier-players.triple{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .tier-card{flex-direction:column;gap:12px}
  .tier-rank-col{flex-direction:row;gap:10px;min-width:auto}
  .tier-players.double,.tier-players.triple{grid-template-columns:1fr}
  .hm-grid{grid-template-columns:1fr}
  .flag-badge{padding:4px 12px 4px 8px}
  .flag-badge .flag{font-size:22px}
  .champion{padding:28px 18px}
  .modal{padding:24px 18px}
  .wrap{padding:24px 12px 40px}
  .crown-wrap .crown{font-size:34px}
}
</style>
</head>
<body>
<div class="confetti" id="confetti"></div>

<div class="wrap">
  <header class="header">
    <div class="kicker">⚽ Office Pool · Round of 32</div>
    <h1>Leaderboard</h1>
    <p class="sub"><span class="pulse-dot"></span> <b id="player-count">—</b> · Two nations each · Group Stage + Round of 32 combined</p>
  </header>

  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search by name or nation..." autocomplete="off">
    <div id="search-count"></div>
  </div>

  <div id="app"></div>

  <footer>
    <b id="footer-count">—</b> · Two drawn nations per player · Total = Group Stage + Round of 32 points<br>
    Last updated from the official pool sheet · ⚽ FIFA World Cup 2026
  </footer>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  var c=document.getElementById('confetti');
  if(!c)return;
  var colors=['#FDB824','#00929F','#FF6B6B','#FFFFFF','#48D1CC','#FFD700','#EA4498'];
  var n=window.innerWidth<480?18:36;
  for(var i=0;i<n;i++){
    var s=document.createElement('i');
    s.style.left=Math.random()*100+'%';
    s.style.background=colors[Math.floor(Math.random()*colors.length)];
    var dur=(4+Math.random()*6).toFixed(2);
    s.style.animationDuration=dur+'s';
    s.style.animationDelay=(-Math.random()*dur)+'s';
    s.style.height=(6+Math.random()*12)+'px';
    s.style.width=(5+Math.random()*7)+'px';
    s.style.opacity=(0.3+Math.random()*0.5).toFixed(2);
    if(Math.random()>.6)s.style.borderRadius='50%';
    c.appendChild(s);
  }
})();

var COUNTRY_CODES={
  'France':'FR','Mexico':'MX','Argentina':'AR','Switzerland':'CH',
  'England':'GB','Colombia':'CO','Norway':'NO','Ivory Coast':'CI',
  'Spain':'ES','Morocco':'MA','Sweden':'SE','Bosnia':'BA',
  'Australia':'AU','Congo DR':'CD','South Africa':'ZA','Ecuador':'EC',
  'Germany':'DE','USA':'US','Brazil':'BR','Japan':'JP',
  'Netherlands':'NL','Egypt':'EG','Portugal':'PT','Canada':'CA',
  'Austria':'AT','Algeria':'DZ','Croatia':'HR','Paraguay':'PY',
  'Scotland':'GB','Curaçao':'CW','Czechia':'CZ','Cabo Verde':'CV',
  'Iran':'IR','Türkiye':'TR','Turkiye':'TR','Senegal':'SN',
  'Uzbekistan':'UZ','Panama':'PA','Uruguay':'UY','Belgium':'BE',
  'Ghana':'GH','Qatar':'QA','New Zealand':'NZ','Korea Republic':'KR',
  'Saudi Arabia':'SA','Haiti':'HT','Jordan':'JO','Tunisia':'TN','Iraq':'IQ'
};
function fe(n){
  var c=COUNTRY_CODES[n];
  if(!c)return'🏳️';
  if(c==='GB')return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
  return String.fromCodePoint.apply(String,c.toUpperCase().split('').map(function(c){return 127397+c.charCodeAt(0)}));
}
function rf(teams){
  return teams.map(function(t){return'<span class="flag">'+fe(t.trim())+'</span>'}).join(' ');
}
function flagBadge(team){
  return'<div class="flag-badge"><span class="flag">'+fe(team.trim())+'</span><span class="fn">'+esc(team.trim())+'</span></div>';
}

var players=[];
function loadData(){
  fetch('data.json?'+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      players=d.players;
      document.getElementById('player-count').textContent=d.totalPlayers+' players';
      document.getElementById('footer-count').textContent=d.totalPlayers+' participants';
      render();
      document.getElementById('search').addEventListener('input',onSearch);
      initFadeIns();
    })
    .catch(function(e){
      document.getElementById('app').innerHTML=
        '<div style="text-align:center;padding:60px 20px;color:var(--muted)">'+
        '<div style="font-size:40px;margin-bottom:10px">⚠️</div>'+
        'Could not load data. Make sure data.json is present.</div>';
    });
}

function gbs(arr){
  var m={};
  arr.forEach(function(p){if(!m[p.total])m[p.total]=[];m[p.total].push(p)});
  return Object.keys(m).map(Number).sort(function(a,b){return b-a}).map(function(k){return{score:k,players:m[k]}});
}

function render(){
  var g=gbs(players);
  var html='';
  html+=rChampion(g);
  html+=rTiers(g);
  html+=rHM(g);
  document.getElementById('app').innerHTML=html;
}

function rChampion(g){
  var gr=g[0];if(!gr||gr.players.length>4||gr.score<18)return'';
  var p=gr.players[0];
  var t=p.teams;
  return'<div class="fade-in champion-wrap"><div class="champion">'+
    '<div class="crown-wrap"><span class="crown">👑</span><span class="trophy">🏆</span></div>'+
    '<div class="champ-badge">🥇 Champion</div>'+
    '<div class="champ-name">'+esc(p.name)+'</div>'+
    '<div class="flag-group">'+t.map(function(tm){return flagBadge(tm)}).join('')+'</div>'+
    '<div class="champ-score" data-count="'+p.total+'">'+p.total+'</div>'+
    '<div class="champ-sub">TOTAL POINTS</div>'+
    '<div class="champ-breakdown">'+
    '<span class="champ-stat"><span class="dot dot-gold"></span>Group Stage: <b>'+(p.t1_gs+p.t2_gs)+'</b></span>'+
    '<span class="champ-stat"><span class="dot dot-teal"></span>R32: <b>'+((p.t1_r32||0)+(p.t2_r32||0))+'</b></span>'+
    '<span class="champ-stat">Chit #<b>'+p.chit+'</b></span>'+
    '</div></div></div>';
}

function rTiers(g){
  var tiers=[
    {label:'Joint Runners-Up',score:22,emoji:'🥈',cls:'tier-silver',span:'auto'},
    {label:'3rd Place',score:21,emoji:'🥉',cls:'tier-bronze',span:'auto'},
    {label:'Joint 4th Place',score:20,emoji:'🏅',cls:'tier-teal',span:'auto'},
    {label:'5th Place',score:19,emoji:'🏅',cls:'tier-teal',span:'auto'},
    {label:'Joint 6th Place',score:18,emoji:'🏅',cls:'tier-teal',span:'auto'}
  ];
  var html='<div class="tier-grid">';
  tiers.forEach(function(t){
    var gr=findG(g,t.score);
    if(!gr)return;
    var n=gr.players.length;
    var gridCls=n===1?'single':n===2?'double':'triple';
    html+='<div class="fade-in tier-card '+t.cls+'">'+
      '<div class="tier-rank-col">'+
      '<span class="tier-medal">'+t.emoji+'</span>'+
      '<span class="tier-label">'+t.label+'</span>'+
      '<span class="tier-score">'+t.score+'</span>'+
      '</div>'+
      '<div class="tier-content"><div class="tier-players '+gridCls+'">';
    gr.players.forEach(function(p){
      html+='<div class="tier-p-card" onclick="openModal('+p.chit+')">'+
        '<div class="p-card-flags">'+rf(p.teams)+'</div>'+
        '<div class="p-card-info"><div class="p-card-name">'+esc(p.name)+'</div>'+
        '<div class="p-card-teams">'+esc(p.pair)+'</div></div>'+
        '<div class="p-card-pts">'+p.total+'</div></div>';
    });
    html+='</div></div></div>';
  });
  html+='</div>';
  return html;
}

function rHM(g){
  var html='<div class="fade-in hm-section">'+
    '<div class="hm-header"><h2>🌟 Honorable Mentions</h2><div class="hm-line"></div></div>';
  var started=false;
  g.forEach(function(gr){
    if(gr.score>=18)return;
    if(!started){started=true;}
    html+='<div class="score-divider"><span>'+gr.score+' pts</span><div class="sd-line"></div></div>'+
      '<div class="hm-grid">';
    gr.players.forEach(function(p){
      var t=p.teams;
      html+='<div class="hm-card" onclick="openModal('+p.chit+')">'+
        '<div class="hm-flags">'+rf(t)+'</div>'+
        '<div class="hm-info"><div class="hm-name">'+esc(p.name)+'</div>'+
        '<div class="hm-teams">'+esc(p.pair)+'</div></div>'+
        '<div class="hm-pts">'+gr.score+'<small>PTS</small></div></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function findG(groups,score){for(var i=0;i<groups.length;i++){if(groups[i].score===score)return groups[i]}return null}
function esc(s){return String(s).replace(/[&<>"']/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]||m})}

function onSearch(){
  var q=document.getElementById('search').value.toLowerCase().trim();
  if(!q){render();document.getElementById('search-count').textContent='';initFadeIns();return}
  var fl=players.filter(function(p){
    return p.name.toLowerCase().includes(q)||p.pair.toLowerCase().includes(q)||
      p.teams.some(function(t){return t.toLowerCase().includes(q)});
  });
  document.getElementById('search-count').textContent='Showing '+fl.length+' of '+players.length+' players';
  if(fl.length===0){
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No players match your search.</div>';
    return;
  }
  var g=gbs(fl),html='';
  html+=rChampion(g);html+=rTiers(g);html+=rHM(g);
  document.getElementById('app').innerHTML=html;
}

function openModal(chit){
  var p=players.find(function(p){return p.chit===chit});
  if(!p)return;
  var r=p.rank;
  var ord=['th','st','nd','rd'];
  var suffix=ord[(r%10>3||Math.floor(r/10)%10===1)?0:r%10]||'th';
  var t=p.teams;
  var body=document.getElementById('modal-body');
  body.innerHTML=
    '<div class="m-rank">#'+r+suffix+' Place</div>'+
    '<div class="m-name">'+esc(p.name)+'</div>'+
    '<div class="m-flag-group">'+
    t.map(function(tm){return'<div class="m-flag-badge"><span class="flag">'+fe(tm.trim())+'</span><span class="fn">'+esc(tm.trim())+'</span></div>'}).join('')+
    '</div>'+
    '<div class="m-total">'+p.total+'</div>'+
    '<div class="m-sub">TOTAL · Group Stage + Round of 32</div>'+
    '<div class="m-breakdown">'+
    '<div class="m-row"><span class="m-label">Chit #</span><span class="m-val">'+p.chit+'</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(t[0])+' Group Stage</span><span class="m-val">'+p.t1_gs+' pts</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(t[1])+' Group Stage</span><span class="m-val">'+p.t2_gs+' pts</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(t[0])+' Round of 32</span><span class="m-val'+(p.t1_r32?' adv':' miss')+'">'+(p.t1_r32!==null?p.t1_r32+' pts':'Did not advance')+'</span></div>'+
    '<div class="m-row"><span class="m-label">'+esc(t[1])+' Round of 32</span><span class="m-val'+(p.t2_r32?' adv':' miss')+'">'+(p.t2_r32!==null?p.t2_r32+' pts':'Did not advance')+'</span></div>'+
    '</div>';
  document.getElementById('modal').classList.add('active');
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
function closeModal(){document.getElementById('modal').classList.remove('active')}

function initFadeIns(){
  setTimeout(function(){
    var els=document.querySelectorAll('.fade-in');
    if(!els.length)return;
    new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){e.target.classList.add('visible');this.unobserve(e.target)}
      }.bind(this));
    },{threshold:.08}).observe(els[0]);
    els.forEach(function(el){new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){entry.target.classList.add('visible');this.unobserve(entry.target)}
      }.bind(this));
    },{threshold:.08}).observe(el)});
  },80);
}

loadData();
</script>
</body>
</html>
